<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiragana & Katakana Flashcards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
  </style>
</head>
<body class="bg-gradient-to-br from-violet-50 to-indigo-100 min-h-screen grid grid-rows-[1fr_auto]" x-data="comboApp()">
  <div class="container mx-auto px-2 py-6 sm:px-4 sm:py-8 w-full flex flex-col justify-center">
    <div class="text-center mb-6 sm:mb-8">
      <h1 class="text-3xl sm:text-4xl font-bold text-gray-800 mb-2">Hiragana & Katakana</h1>
      <p class="text-gray-600 text-sm sm:text-base">Click a card to flip • <span x-text="flippedCount"></span> / <span x-text="cards.length"></span> flipped</p>
    </div>

    <div class="flex flex-wrap justify-center gap-2 sm:gap-4 mb-6">
      <button @click="shuffle()" class="px-4 sm:px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        Shuffle
      </button>
      <button @click="flipAll()" class="px-4 sm:px-6 py-2 bg-violet-600 hover:bg-violet-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        <span x-show="!allFlipped">Flip All</span>
        <span x-show="allFlipped">Unflip All</span>
      </button>
      <button @click="layout = layout === 'grid' ? 'single' : 'grid'" class="px-4 sm:px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        <span x-show="layout === 'grid'">Single View</span>
        <span x-show="layout === 'single'">Grid View</span>
      </button>
      <button @click="toggleSoundMode()" class="px-4 sm:px-6 py-2 rounded-lg shadow transition-colors text-sm sm:text-base"
              :class="showText ? 'bg-amber-500 hover:bg-amber-600 text-white' : 'bg-purple-600 hover:bg-purple-700 text-white'">
        <span x-show="showText">Romaji</span>
        <span x-show="!showText">Sound 🔊</span>
      </button>
      <button x-show="!showText" @click="cycleVoice()" class="px-4 py-2 rounded-lg shadow bg-purple-600 hover:bg-purple-700 text-white text-sm">
        <span x-text="voiceLabel"></span> ↻
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-1 sm:gap-2 mb-6">
      <button @click="toggleCategory('basic')" 
              class="px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="categories.basic ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Basic <span x-text="basicCount"></span>
      </button>
      <button @click="toggleCategory('dakuon')" 
              class="px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="categories.dakuon ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Dakuon <span x-text="dakuonCount"></span>
      </button>
      <button @click="toggleCategory('handakuon')" 
              class="px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="categories.handakuon ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Handakuon <span x-text="handakuonCount"></span>
      </button>
      <button @click="toggleCategory('youon')" 
              class="px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="categories.youon ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Youon <span x-text="youonCount"></span>
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-2 sm:gap-3" x-show="layout === 'grid'">
      <template x-for="(card, index) in cards" :key="index">
        <div class="perspective-1000 w-20 h-32 sm:w-32 sm:h-48 cursor-pointer" @click="flipCard(index)">
          <div class="transform-style-3d w-full h-full relative transition-transform duration-300" 
               :class="card.flipped ? 'rotate-y-180' : ''">
            
            <div class="absolute w-full h-full backface-hidden bg-white rounded-xl shadow-lg flex flex-col items-center justify-center border-2 border-gray-300 p-1 gap-1 sm:gap-2">
              <span class="text-3xl sm:text-4xl text-rose-500" x-text="card.hiragana"></span>
              <span class="text-3xl sm:text-4xl text-emerald-500" x-text="card.katakana"></span>
            </div>
            
            <div class="absolute w-full h-full backface-hidden rounded-xl shadow-lg flex flex-col items-center justify-center border-2 rotate-y-180 cursor-pointer bg-gradient-to-br from-violet-500 to-purple-600 border-purple-300"
                 @click.stop="showText ? flipCard(index) : playSoundFromCard(card)">
              <span class="text-2xl sm:text-3xl text-white font-semibold" 
                    x-text="showText ? card.romaji : '🔊'"></span>
              <span x-show="!showText" @click.stop="flipCard(index)" class="text-xl sm:text-2xl mt-2 text-white/70 hover:text-white cursor-pointer">🔄</span>
            </div>
            
          </div>
        </div>
      </template>
    </div>

    <div x-show="layout === 'single'" x-cloak class="flex flex-col items-center">
      <div class="perspective-1000 w-72 h-48 sm:w-[28rem] sm:h-64 cursor-pointer mb-6" @click="toggleCurrentCard()">
        <div class="transform-style-3d w-full h-full relative transition-transform duration-300" 
             :class="currentCard?.flipped ? 'rotate-y-180' : ''">
          
          <div class="absolute w-full h-full backface-hidden bg-white rounded-2xl shadow-2xl flex items-center justify-center border-4 border-gray-300 p-4">
            <div class="flex items-center justify-center gap-4 sm:gap-8">
              <span class="text-5xl sm:text-7xl text-rose-500" x-text="currentCard?.hiragana"></span>
              <span class="text-5xl sm:text-7xl text-emerald-500" x-text="currentCard?.katakana"></span>
            </div>
          </div>
          
          <div class="absolute w-full h-full backface-hidden rounded-2xl shadow-2xl flex flex-col items-center justify-center border-4 rotate-y-180 cursor-pointer bg-gradient-to-br from-violet-500 to-purple-600 border-purple-300"
               @click.stop="showText ? toggleCurrentCard() : playSoundFromCard(currentCard)">
            <span class="text-4xl sm:text-5xl text-white font-semibold" 
                  x-text="showText ? currentCard?.romaji : '🔊'"></span>
            <span x-show="!showText" @click.stop="toggleCurrentCard()" class="text-3xl sm:text-4xl mt-4 text-white/70 hover:text-white cursor-pointer">🔄</span>
          </div>
          
        </div>
      </div>
      
      <div class="flex flex-col items-center gap-2">
        <div class="flex items-center gap-4">
          <button @click="prevCard()" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-lg">
            ← Prev
          </button>
          <button x-show="!showText" @click="playSoundFromCard(currentCard)" class="px-8 py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-lg shadow transition-colors text-lg">
            🔊 Listen
          </button>
          <button @click="nextCard()" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-lg">
            Next →
          </button>
        </div>
        <span class="text-gray-600 font-medium" x-text="(currentIndex + 1) + ' / ' + cards.length"></span>
      </div>
    </div>
  </div>

  <script>
    function comboApp() {

        { id: 'n', romaji: 'n', category: 'basic', hiragana: 'ん', katakana: 'ン' },
        { id: 'ga', romaji: 'ga', category: 'dakuon', hiragana: 'が', katakana: 'ガ' },
        { id: 'gi', romaji: 'gi', category: 'dakuon', hiragana: 'ぎ', katakana: 'ギ' },
        { id: 'gu', romaji: 'gu', category: 'dakuon', hiragana: 'ぐ', katakana: 'グ' },
        { id: 'ge', romaji: 'ge', category: 'dakuon', hiragana: 'げ', katakana: 'ゲ' },

        { id: 'zo', romaji: 'zo', category: 'dakuon', hiragana: 'ぞ', katakana: 'ゾ' },
        { id: 'da', romaji: 'da', category: 'dakuon', hiragana: 'だ', katakana: 'ダ' },
        { id: 'di', romaji: 'di', category: 'dakuon', hiragana: 'ぢ', katakana: 'ヂ' },
        { id: 'du', romaji: 'du', category: 'dakuon', hiragana: 'づ', katakana: 'ヅ' },
        { id: 'de', romaji: 'de', category: 'dakuon', hiragana: 'で', katakana: 'デ' },
        { id: 'do', romaji: 'do', category: 'dakuon', hiragana: 'ど', katakana: 'ド' },
        { id: 'ba', romaji: 'ba', category: 'dakuon', hiragana: 'ば', katakana: 'バ' },
        { id: 'bi', romaji: 'bi', category: 'dakuon', hiragana: 'び', katakana: 'ビ' },
        { id: 'bu', romaji: 'bu', category: 'dakuon', hiragana: 'ぶ', katakana: 'ブ' },
        { id: 'be', romaji: 'be', category: 'dakuon', hiragana: 'べ', katakana: 'ベ' },
        { id: 'bo', romaji: 'bo', category: 'dakuon', hiragana: 'ぼ', katakana: 'ボ' },
        { id: 'pa', romaji: 'pa', category: 'handakuon', hiragana: 'ぱ', katakana: 'パ' },
        { id: 'pi', romaji: 'pi', category: 'handakuon', hiragana: 'ぴ', katakana: 'ピ' },
        { id: 'pu', romaji: 'pu', category: 'handakuon', hiragana: 'ぷ', katakana: 'プ' },
        { id: 'pe', romaji: 'pe', category: 'handakuon', hiragana: 'ぺ', katakana: 'ペ' },
        { id: 'po', romaji: 'po', category: 'handakuon', hiragana: 'ぽ', katakana: 'ポ' },
        { id: 'kya', romaji: 'kya', category: 'youon', hiragana: 'きゃ', katakana: 'キャ' },
        { id: 'kyu', romaji: 'kyu', category: 'youon', hiragana: 'きゅ', katakana: 'キュ' },
        { id: 'kyo', romaji: 'kyo', category: 'youon', hiragana: 'きょ', katakana: 'キョ' },
        { id: 'sha', romaji: 'sha', category: 'youon', hiragana: 'しゃ', katakana: 'シャ' },
        { id: 'shu', romaji: 'shu', category: 'youon', hiragana: 'しゅ', katakana: 'シュ' },
        { id: 'sho', romaji: 'sho', category: 'youon', hiragana: 'しょ', katakana: 'ショ' },
        { id: 'cha', romaji: 'cha', category: 'youon', hiragana: 'ちゃ', katakana: 'チャ' },
        { id: 'chu', romaji: 'chu', category: 'youon', hiragana: 'ちゅ', katakana: 'チュ' },
        { id: 'cho', romaji: 'cho', category: 'youon', hiragana: 'ちょ', katakana: 'チョ' },
        { id: 'nya', romaji: 'nya', category: 'youon', hiragana: 'にゃ', katakana: 'ニャ' },
        { id: 'nyu', romaji: 'nyu', category: 'youon', hiragana: 'にゅ', katakana: 'ニュ' },
        { id: 'nyo', romaji: 'nyo', category: 'youon', hiragana: 'にょ', katakana: 'ニョ' },
        { id: 'hya', romaji: 'hya', category: 'youon', hiragana: 'ひゃ', katakana: 'ヒャ' },
        { id: 'hyu', romaji: 'hyu', category: 'youon', hiragana: 'ひゅ', katakana: 'ヒュ' },
        { id: 'hyo', romaji: 'hyo', category: 'youon', hiragana: 'ひょ', katakana: 'ヒョ' },
        { id: 'mya', romaji: 'mya', category: 'youon', hiragana: 'みゃ', katakana: 'ミャ' },
        { id: 'myu', romaji: 'myu', category: 'youon', hiragana: 'みゅ', katakana: 'ミュ' },
        { id: 'myo', romaji: 'myo', category: 'youon', hiragana: 'みょ', katakana: 'ミョ' },
        { id: 'rya', romaji: 'rya', category: 'youon', hiragana: 'りゃ', katakana: 'リャ' },
        { id: 'ryu', romaji: 'ryu', category: 'youon', hiragana: 'りゅ', katakana: 'リュ' },
        { id: 'ryo', romaji: 'ryo', category: 'youon', hiragana: 'りょ', katakana: 'リョ' },
        { id: 'gya', romaji: 'gya', category: 'youon', hiragana: 'ぎゃ', katakana: 'ギャ' },
        { id: 'gyu', romaji: 'gyu', category: 'youon', hiragana: 'ぎゅ', katakana: 'ギュ' },
        { id: 'gyo', romaji: 'gyo', category: 'youon', hiragana: 'ぎょ', katakana: 'ギョ' },
        { id: 'ja', romaji: 'ja', category: 'youon', hiragana: 'じゃ', katakana: 'ジャ' },
        { id: 'ju', romaji: 'ju', category: 'youon', hiragana: 'じゅ', katakana: 'ジュ' },
        { id: 'jo', romaji: 'jo', category: 'youon', hiragana: 'じょ', katakana: 'ジョ' },
        { id: 'bya', romaji: 'bya', category: 'youon', hiragana: 'びゃ', katakana: 'ビャ' },
        { id: 'byu', romaji: 'byu', category: 'youon', hiragana: 'びゅ', katakana: 'ビュ' },
        { id: 'byo', romaji: 'byo', category: 'youon', hiragana: 'びょ', katakana: 'ビョ' },
        { id: 'pya', romaji: 'pya', category: 'youon', hiragana: 'ぴゃ', katakana: 'ピャ' },
        { id: 'pyu', romaji: 'pyu', category: 'youon', hiragana: 'ぴゅ', katakana: 'ピュ' },
        { id: 'pyo', romaji: 'pyo', category: 'youon', hiragana: 'ぴょ', katakana: 'ピョ' }
      ];

      return {
        allCards: comboData.map(item => ({ ...item, flipped: false })),
        categories: { basic: true, dakuon: true, handakuon: true, youon: true },
        layout: 'grid',
        currentIndex: 0,
        showText: false,
        selectedVoice: 'edge-tts-nanami',
        voices: [
          { id: 'edge-tts-nanami', label: 'Nanami' },
          { id: 'google-tts', label: 'Google' },
          { id: 'edge-tts-keita', label: 'Keita' }
        ],

        init() {
          document.addEventListener('keydown', (e) => {
            if (this.layout !== 'single') return;
            if (e.key === 'ArrowLeft') this.prevCard();
            if (e.key === 'ArrowRight') this.nextCard();
            if (e.key === ' ') {
              e.preventDefault();
              document.activeElement.blur();
              if (!this.showText) this.playSoundFromCard(this.currentCard);
            }
          });
        },

        get cards() {
          return this.allCards.filter(card => this.categories[card.category]);
        },

        get currentCard() {
          return this.cards[this.currentIndex] || null;
        },

        get basicCount() { return this.allCards.filter(c => c.category === 'basic').length; },
        get dakuonCount() { return this.allCards.filter(c => c.category === 'dakuon').length; },
        get handakuonCount() { return this.allCards.filter(c => c.category === 'handakuon').length; },
        get youonCount() { return this.allCards.filter(c => c.category === 'youon').length; },
        
        get flippedCount() {
          return this.cards.filter(c => c.flipped).length;
        },
        
        get allFlipped() {
          return this.flippedCount === this.cards.length;
        },

        get voiceLabel() {
          const voice = this.voices.find(v => v.id === this.selectedVoice);
          return voice ? voice.label : 'Voice';
        },

        cycleVoice() {
          const currentIndex = this.voices.findIndex(v => v.id === this.selectedVoice);
          const nextIndex = (currentIndex + 1) % this.voices.length;
          this.selectedVoice = this.voices[nextIndex].id;
        },

        toggleCategory(category) {
          this.categories[category] = !this.categories[category];
          this.currentIndex = 0;
        },

        flipCard(index) {
          const card = this.cards[index];
          card.flipped = !card.flipped;
        },

        toggleCurrentCard() {
          if (this.currentCard) {
            this.currentCard.flipped = !this.currentCard.flipped;
          }
        },

        nextCard() {
          if (this.currentIndex < this.cards.length - 1) {
            this.currentIndex++;
          } else {
            this.currentIndex = 0;
          }
          if (!this.showText) {
            this.playSoundFromCard(this.currentCard);
          }
        },

        prevCard() {
          if (this.currentIndex > 0) {
            this.currentIndex--;
          } else {
            this.currentIndex = this.cards.length - 1;
          }
          if (!this.showText) {
            this.playSoundFromCard(this.currentCard);
          }
        },
        
        shuffle() {
          const visibleCards = this.cards;
          for (let i = visibleCards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const cardI = visibleCards[i];
            const cardJ = visibleCards[j];
            const idxI = this.allCards.indexOf(cardI);
            const idxJ = this.allCards.indexOf(cardJ);
            [this.allCards[idxI], this.allCards[idxJ]] = [this.allCards[idxJ], this.allCards[idxI]];
          }
        },
        
        flipAll() {
          const shouldFlip = !this.allFlipped;
          this.cards.forEach(card => card.flipped = shouldFlip);
        },

        toggleSoundMode() {
          this.showText = !this.showText;
          if (!this.showText && this.layout === 'single') {
            this.playSoundFromCard(this.currentCard);
          }
        },

        playSoundFromCard(card) {
          if (!card) return;
          const filename = card.hiragana + '.mp3';
          const audioUrl = `${this.selectedVoice}/hiragana/${filename}`;
          const audio = new Audio(audioUrl);
          audio.play().catch(err => console.log('Playback failed:', err));
        }
      };
    }
  </script>
