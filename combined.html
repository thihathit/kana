<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiragana & Katakana Flashcards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
  </style>
</head>
<body class="bg-gradient-to-br from-violet-50 to-indigo-100 min-h-screen flex items-center" x-data="comboApp()">
  <div class="container mx-auto px-2 py-6 sm:px-4 sm:py-8 w-full">
    <div class="text-center mb-6 sm:mb-8">
      <h1 class="text-3xl sm:text-4xl font-bold text-gray-800 mb-2">Hiragana & Katakana</h1>
      <p class="text-gray-600 text-sm sm:text-base">Click a card to flip • <span x-text="flippedCount"></span> / <span x-text="cards.length"></span> flipped</p>
    </div>

    <div class="flex flex-wrap justify-center gap-2 sm:gap-4 mb-6">
      <button @click="shuffle()" class="px-4 sm:px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        Shuffle
      </button>
      <button @click="flipAll()" class="px-4 sm:px-6 py-2 bg-violet-600 hover:bg-violet-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        <span x-show="!allFlipped">Flip All</span>
        <span x-show="allFlipped">Unflip All</span>
      </button>
      <button @click="layout = layout === 'grid' ? 'single' : 'grid'" class="px-4 sm:px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        <span x-show="layout === 'grid'">Single View</span>
        <span x-show="layout === 'single'">Grid View</span>
      </button>
      <button @click="showRomaji = !showRomaji" class="px-4 sm:px-6 py-2 rounded-lg shadow transition-colors text-sm sm:text-base"
              :class="showRomaji ? 'bg-amber-500 hover:bg-amber-600 text-white' : 'bg-purple-600 hover:bg-purple-700 text-white'">
        <span x-show="showRomaji">Romaji</span>
        <span x-show="!showRomaji">Sound 🔊</span>
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-1 sm:gap-2 mb-6">
      <button @click="toggleFilter('hiragana')" 
              class="px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="filters.hiragana ? 'bg-rose-600 text-white' : 'bg-gray-200 text-gray-700'">
        Hiragana <span x-text="hiraganaCount"></span>
      </button>
      <button @click="toggleFilter('katakana')" 
              class="px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="filters.katakana ? 'bg-emerald-600 text-white' : 'bg-gray-200 text-gray-700'">
        Katakana <span x-text="katakanaCount"></span>
      </button>
      <button @click="toggleCategory('basic')" 
              class="px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="categories.basic ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Basic <span x-text="basicCount"></span>
      </button>
      <button @click="toggleCategory('dakuon')" 
              class="px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="categories.dakuon ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Dakuon <span x-text="dakuonCount"></span>
      </button>
      <button @click="toggleCategory('handakuon')" 
              class="px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="categories.handakuon ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Handakuon <span x-text="handakuonCount"></span>
      </button>
      <button @click="toggleCategory('youon')" 
              class="px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="categories.youon ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Youon <span x-text="youonCount"></span>
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-2 sm:gap-3" x-show="layout === 'grid'">
      <template x-for="(card, index) in cards" :key="index">
        <div class="perspective-1000 w-20 h-28 sm:w-32 sm:h-44 cursor-pointer" @click="flipCard(index)">
          <div class="transform-style-3d w-full h-full relative transition-transform duration-300" 
               :class="card.flipped ? 'rotate-y-180' : ''">
            
            <div class="absolute w-full h-full backface-hidden bg-white rounded-xl shadow-lg flex items-center justify-center border-2 border-gray-300 p-2">
              <span class="text-4xl sm:text-5xl" 
                    :class="card.type === 'hiragana' ? 'text-rose-500' : 'text-emerald-500'"
                    x-text="card.char"></span>
            </div>
            
            <div class="absolute w-full h-full backface-hidden rounded-xl shadow-lg flex flex-col items-center justify-center border-2 rotate-y-180 cursor-pointer"
                 :class="card.type === 'hiragana' ? 'bg-rose-500 border-rose-300' : 'bg-emerald-500 border-emerald-300'"
                 @click.stop="showRomaji ? flipCard(index) : playSoundFromCard(card)">
              <span class="text-2xl sm:text-3xl text-white font-semibold" 
                    x-text="showRomaji ? card.romaji : '🔊'"></span>
              <span x-show="!showRomaji" @click.stop="flipCard(index)" class="text-2xl mt-2 text-white/70 hover:text-white cursor-pointer">🔄</span>
            </div>
            
          </div>
        </div>
      </template>
    </div>

    <div x-show="layout === 'single'" x-cloak class="flex flex-col items-center">
      <div class="perspective-1000 w-48 h-64 sm:w-64 sm:h-80 cursor-pointer mb-6" @click="toggleCurrentCard()">
        <div class="transform-style-3d w-full h-full relative transition-transform duration-300" 
             :class="currentCard?.flipped ? 'rotate-y-180' : ''">
          
          <div class="absolute w-full h-full backface-hidden bg-white rounded-2xl shadow-2xl flex items-center justify-center border-4 border-gray-300 p-4">
            <span class="text-7xl sm:text-8xl" 
                  :class="currentCard?.type === 'hiragana' ? 'text-rose-500' : 'text-emerald-500'"
                  x-text="currentCard?.char"></span>
          </div>
          
          <div class="absolute w-full h-full backface-hidden rounded-2xl shadow-2xl flex flex-col items-center justify-center border-4 rotate-y-180 cursor-pointer"
               :class="currentCard?.type === 'hiragana' ? 'bg-rose-500 border-rose-300' : 'bg-emerald-500 border-emerald-300'"
               @click.stop="showRomaji ? toggleCurrentCard() : playSoundFromCard(currentCard)">
            <span class="text-4xl sm:text-5xl text-white font-semibold" 
                  x-text="showRomaji ? currentCard?.romaji : '🔊'"></span>
            <span x-show="!showRomaji" @click.stop="toggleCurrentCard()" class="text-4xl mt-4 text-white/70 hover:text-white cursor-pointer">🔄</span>
          </div>
          
        </div>
      </div>
      
      <div class="flex items-center gap-4">
        <button @click="prevCard()" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-lg">
          ← Prev
        </button>
        <span class="text-gray-600 font-medium min-w-[80px] text-center" x-text="(currentIndex + 1) + ' / ' + cards.length"></span>
        <button @click="nextCard()" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-lg">
          Next →
        </button>
      </div>
    </div>
  </div>

        { char: 'チャ', romaji: 'cha', type: 'katakana', category: 'youon' }, { char: 'チュ', romaji: 'chu', type: 'katakana', category: 'youon' }, { char: 'チョ', romaji: 'cho', type: 'katakana', category: 'youon' },
        { char: 'ニャ', romaji: 'nya', type: 'katakana', category: 'youon' }, { char: 'ニュ', romaji: 'nyu', type: 'katakana', category: 'youon' }, { char: 'ニョ', romaji: 'nyo', type: 'katakana', category: 'youon' },
        { char: 'ヒャ', romaji: 'hya', type: 'katakana', category: 'youon' }, { char: 'ヒュ', romaji: 'hyu', type: 'katakana', category: 'youon' }, { char: 'ヒョ', romaji: 'hyo', type: 'katakana', category: 'youon' },
        { char: 'ミャ', romaji: 'mya', type: 'katakana', category: 'youon' }, { char: 'ミュ', romaji: 'myu', type: 'katakana', category: 'youon' }, { char: 'ミョ', romaji: 'myo', type: 'katakana', category: 'youon' },
        { char: 'リャ', romaji: 'rya', type: 'katakana', category: 'youon' }, { char: 'リュ', romaji: 'ryu', type: 'katakana', category: 'youon' }, { char: 'リョ', romaji: 'ryo', type: 'katakana', category: 'youon' },
        { char: 'ギャ', romaji: 'gya', type: 'katakana', category: 'youon' }, { char: 'ギュ', romaji: 'gyu', type: 'katakana', category: 'youon' }, { char: 'ギョ', romaji: 'gyo', type: 'katakana', category: 'youon' },
        { char: 'ジャ', romaji: 'ja', type: 'katakana', category: 'youon' }, { char: 'ジュ', romaji: 'ju', type: 'katakana', category: 'youon' }, { char: 'ジョ', romaji: 'jo', type: 'katakana', category: 'youon' },
        { char: 'ビャ', romaji: 'bya', type: 'katakana', category: 'youon' }, { char: 'ビュ', romaji: 'byu', type: 'katakana', category: 'youon' }, { char: 'ビョ', romaji: 'byo', type: 'katakana', category: 'youon' },
        { char: 'ピャ', romaji: 'pya', type: 'katakana', category: 'youon' }, { char: 'ピュ', romaji: 'pyu', type: 'katakana', category: 'youon' }, { char: 'ピョ', romaji: 'pyo', type: 'katakana', category: 'youon' }
      ];

      return {
        allCards: comboData.map(item => ({ ...item, flipped: false })),
        filters: { hiragana: true, katakana: true },
        categories: { basic: true, dakuon: true, handakuon: true, youon: true },
        layout: 'grid',
        currentIndex: 0,
        showRomaji: false,

        get cards() {
          return this.allCards.filter(card => 
            this.filters[card.type] && this.categories[card.category]
          );
        },

        get currentCard() {
          return this.cards[this.currentIndex] || null;
        },

        get hiraganaCount() { return this.allCards.filter(c => c.type === 'hiragana').length; },
        get katakanaCount() { return this.allCards.filter(c => c.type === 'katakana').length; },
        get basicCount() { return this.allCards.filter(c => c.category === 'basic').length; },
        get dakuonCount() { return this.allCards.filter(c => c.category === 'dakuon').length; },
        get handakuonCount() { return this.allCards.filter(c => c.category === 'handakuon').length; },
        get youonCount() { return this.allCards.filter(c => c.category === 'youon').length; },
        
        get flippedCount() {
          return this.cards.filter(c => c.flipped).length;
        },
        
        get allFlipped() {
          return this.flippedCount === this.cards.length;
        },

        toggleFilter(filter) {
          this.filters[filter] = !this.filters[filter];
          this.currentIndex = 0;
        },

        toggleCategory(category) {
          this.categories[category] = !this.categories[category];
          this.currentIndex = 0;
        },

        flipCard(index) {
          const card = this.cards[index];
          card.flipped = !card.flipped;
        },

        toggleCurrentCard() {
          if (this.currentCard) {
            this.currentCard.flipped = !this.currentCard.flipped;
          }
        },

        nextCard() {
          if (this.currentIndex < this.cards.length - 1) {
            this.currentIndex++;
          } else {
            this.currentIndex = 0;
          }
        },

        prevCard() {
          if (this.currentIndex > 0) {
            this.currentIndex--;
          } else {
            this.currentIndex = this.cards.length - 1;
          }
        },
        
        shuffle() {
          const visibleCards = this.cards;
          for (let i = visibleCards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const cardI = visibleCards[i];
            const cardJ = visibleCards[j];
            const idxI = this.allCards.indexOf(cardI);
            const idxJ = this.allCards.indexOf(cardJ);
            [this.allCards[idxI], this.allCards[idxJ]] = [this.allCards[idxJ], this.allCards[idxI]];
          }
        },
        
        flipAll() {
          const shouldFlip = !this.allFlipped;
          this.cards.forEach(card => card.flipped = shouldFlip);
        },

        playSoundFromCard(card) {
          if (this.showRomaji || !card) return;
          const folder = card.type === 'katakana' ? 'katakana' : 'hiragana';
          const filename = card.char + '.mp3';
          const audioUrl = `google-tts/${folder}/${filename}`;
          const audio = new Audio(audioUrl);
          audio.play().catch(err => console.log('Playback failed:', err));
        }
      };
    }
  </script>
</body>
</html>
