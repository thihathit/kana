<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lookalike Kanas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
  </style>
</head>
<body class="bg-gradient-to-br from-orange-50 to-red-100 min-h-screen grid grid-rows-[1fr_auto]" x-data="lookalikeApp()">
  <div class="container mx-auto px-2 py-6 sm:px-4 sm:py-8 w-full flex flex-col justify-center">
    <div class="text-center mb-6 sm:mb-8">
      <h1 class="text-3xl sm:text-4xl font-bold text-gray-800 mb-2 flex items-center justify-center gap-2">
        Lookalike Kanas
        <span class="text-xs px-2 py-1 bg-yellow-400 text-yellow-800 rounded-full font-bold">BETA</span>
      </h1>
      <p class="text-gray-600 text-sm sm:text-base">Can you tell these apart? • <span x-text="flippedCount"></span> / <span x-text="cards.length"></span> revealed</p>
    </div>

    <div class="flex flex-wrap justify-center gap-2 sm:gap-4 mb-6">
      <button @click="shuffle()" class="px-4 sm:px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        Shuffle
      </button>
      <button @click="flipAll()" class="px-4 sm:px-6 py-2 bg-orange-600 hover:bg-orange-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        <span x-show="!allFlipped">Reveal All</span>
        <span x-show="allFlipped">Hide All</span>
      </button>
      <button @click="layout = layout === 'grid' ? 'single' : 'grid'" class="px-4 sm:px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        <span x-show="layout === 'grid'">Single View</span>
        <span x-show="layout === 'single'">Grid View</span>
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-3 sm:gap-4" x-show="layout === 'grid'">
      <template x-for="(card, index) in cards" :key="index">
        <div class="perspective-1000 w-24 h-32 sm:w-32 sm:h-40 cursor-pointer" @click="flipCard(index)">
          <div class="transform-style-3d w-full h-full relative transition-transform duration-300" 
               :class="card.flipped ? 'rotate-y-180' : ''">
            
            <div class="absolute w-full h-full backface-hidden bg-white rounded-xl shadow-lg flex items-center justify-center border-2 border-gray-300 p-2">
              <div class="flex justify-center items-center gap-1 sm:gap-2">
                <template x-for="(item, i) in card.chars" :key="i">
                  <span class="text-4xl sm:text-5xl text-gray-800" x-text="item.char"></span>
                </template>
              </div>
            </div>
            
            <div class="absolute w-full h-full backface-hidden bg-gradient-to-br from-orange-500 to-red-500 rounded-xl shadow-lg flex flex-col items-center justify-center border-2 border-orange-300 rotate-y-180 p-2">
              <div class="flex justify-center items-center gap-2 sm:gap-3 mb-2">
                <template x-for="(item, i) in card.chars" :key="i">
                  <div class="flex flex-col items-center">
                    <span class="text-2xl sm:text-3xl text-white font-bold" x-text="item.char"></span>
                    <span class="text-xs text-white/80" x-text="item.romaji"></span>
                  </div>
                </template>
              </div>
              <span class="text-xs text-white/70 text-center" x-text="card.tip"></span>
            </div>
            
          </div>
        </div>
      </template>
    </div>

    <div x-show="layout === 'single'" x-cloak class="flex flex-col items-center">
      <div class="perspective-1000 w-64 h-72 sm:w-80 sm:h-96 cursor-pointer mb-6" @click="toggleCurrentCard()">
        <div class="transform-style-3d w-full h-full relative transition-transform duration-300" 
             :class="currentCard?.flipped ? 'rotate-y-180' : ''">
          
          <div class="absolute w-full h-full backface-hidden bg-white rounded-2xl shadow-2xl flex items-center justify-center border-4 border-gray-300 p-4">
            <div class="flex justify-center items-center gap-4">
              <template x-for="(item, i) in currentCard?.chars" :key="i">
                <span class="text-6xl sm:text-7xl text-gray-800" x-text="item.char"></span>
              </template>
            </div>
          </div>
          
          <div class="absolute w-full h-full backface-hidden bg-gradient-to-br from-orange-500 to-red-500 rounded-2xl shadow-2xl flex flex-col items-center justify-center border-4 border-orange-300 rotate-y-180 p-4">
            <div class="flex justify-center items-center gap-6 mb-4">
              <template x-for="(item, i) in currentCard?.chars" :key="i">
                <div class="flex flex-col items-center">
                  <span class="text-5xl sm:text-6xl text-white font-bold" x-text="item.char"></span>
                  <span class="text-base text-white/80" x-text="item.romaji"></span>
                </div>
              </template>
            </div>
            <span class="text-base text-white/80 text-center" x-text="currentCard?.tip"></span>
          </div>
          
        </div>
      </div>
      
      <div class="flex items-center gap-4">
        <button @click="prevCard()" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-lg">
          ← Prev
        </button>
        <span class="text-gray-600 font-medium min-w-[80px] text-center" x-text="(currentIndex + 1) + ' / ' + cards.length"></span>
        <button @click="nextCard()" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-lg">
          Next →
        </button>
      </div>
    </div>
  </div>

  <script>
    function lookalikeApp() {
      const lookalikeGroups = [
        { chars: [{char: 'き', romaji: 'ki'}, {char: 'さ', romaji: 'sa'}], tip: 'き has 2 lines at top, さ has 1' },
        { chars: [{char: 'お', romaji: 'o'}, {char: 'む', romaji: 'mu'}], tip: 'お goes down then through, む loops' },
        { chars: [{char: 'こ', romaji: 'ko'}, {char: 'て', romaji: 'te'}], tip: 'こ has enclosed bottom, て is simpler' },
        { chars: [{char: 'た', romaji: 'ta'}, {char: 'な', romaji: 'na'}], tip: 'た simple, な has loop at bottom' },
        { chars: [{char: 'ぬ', romaji: 'nu'}, {char: 'め', romaji: 'me'}], tip: 'ぬ loops at end, め is closed' },
        { chars: [{char: 'は', romaji: 'ha'}, {char: 'ほ', romaji: 'ho'}], tip: 'は opens right, ほ has line through' },
        { chars: [{char: 'い', romaji: 'i'}, {char: 'り', romaji: 'ri'}], tip: 'い is vertical, り curves' },
        { chars: [{char: 'つ', romaji: 'tsu'}, {char: 'う', romaji: 'u'}], tip: 'つ is hook, う has wave' },
        { chars: [{char: 'ま', romaji: 'ma'}, {char: 'も', romaji: 'mo'}], tip: 'ま crosses, も has loop' },
        { chars: [{char: 'け', romaji: 'ke'}, {char: 'さ', romaji: 'sa'}], tip: 'Similar curved structure' },
        { chars: [{char: 'け', romaji: 'ke'}, {char: 'せ', romaji: 'se'}], tip: 'Both have enclosed or crossed structure' },
        { chars: [{char: 'シ', romaji: 'shi'}, {char: 'ツ', romaji: 'tsu'}], tip: 'シ strokes horizontal, ツ strokes vertical' },
        { chars: [{char: 'ン', romaji: 'n'}, {char: 'ソ', romaji: 'so'}], tip: 'ン stroke horiz, ソ stroke more vertical' },
        { chars: [{char: 'ウ', romaji: 'u'}, {char: 'ワ', romaji: 'wa'}], tip: 'ウ has small line top, ワ has none' },
        { chars: [{char: 'コ', romaji: 'ko'}, {char: 'ユ', romaji: 'yu'}], tip: 'コ lines meet, ユ extends right' },
        { chars: [{char: 'ク', romaji: 'ku'}, {char: 'ケ', romaji: 'ke'}], tip: 'ク line goes down, ケ extends right' },
        { chars: [{char: 'ア', romaji: 'a'}, {char: 'マ', romaji: 'ma'}], tip: 'ア goes down-left, マ goes down-right' },
        { chars: [{char: 'セ', romaji: 'se'}, {char: 'ヒ', romaji: 'hi'}], tip: 'Both have cross-like structure' },
        { chars: [{char: 'ヤ', romaji: 'ya'}, {char: 'セ', romaji: 'se'}], tip: 'Similar cross patterns' },
        { chars: [{char: 'マ', romaji: 'ma'}, {char: 'ム', romaji: 'mu'}], tip: 'Both enclosed shapes' },
        { chars: [{char: 'フ', romaji: 'fu'}, {char: 'ヘ', romaji: 'he'}], tip: 'Both V-shaped' },
        { chars: [{char: 'ナ', romaji: 'na'}, {char: 'メ', romaji: 'me'}], tip: 'Similar crossed strokes' },
        { chars: [{char: 'ケ', romaji: 'ke'}, {char: 'セ', romaji: 'se'}], tip: 'Both have cross-like structure' },
        { chars: [{char: 'つ', romaji: 'tsu'}, {char: 'フ', romaji: 'fu'}], tip: 'Small hook vs angular' },
        { chars: [{char: 'し', romaji: 'shi'}, {char: 'レ', romaji: 're'}], tip: 'Curvy hook vs angular' },
        { chars: [{char: 'せ', romaji: 'se'}, {char: 'サ', romaji: 'sa'}], tip: 'せ crosses middle, サ has horiz line' },
        { chars: [{char: 'こ', romaji: 'ko'}, {char: 'ニ', romaji: 'ni'}], tip: 'こ enclosed, ニ flat lines' },
        { chars: [{char: 'り', romaji: 'ri'}, {char: 'ク', romaji: 'ku'}], tip: 'Similar hook strokes' },
        { chars: [{char: 'う', romaji: 'u'}, {char: 'ラ', romaji: 'ra'}], tip: 'Wave vs angular' },
      ];

      return {
        allCards: lookalikeGroups.map(item => ({ ...item, flipped: false })),
        layout: 'grid',
        currentIndex: 0,

        get cards() {
          return this.allCards;
        },

        get currentCard() {
          return this.cards[this.currentIndex] || null;
        },
        
        get flippedCount() {
          return this.cards.filter(c => c.flipped).length;
        },
        
        get allFlipped() {
          return this.flippedCount === this.cards.length && this.cards.length > 0;
        },

        flipCard(index) {
          const card = this.cards[index];
          card.flipped = !card.flipped;
        },

        toggleCurrentCard() {
          if (this.currentCard) {
            this.currentCard.flipped = !this.currentCard.flipped;
          }
        },

        nextCard() {
          if (this.currentIndex < this.cards.length - 1) {
            this.currentIndex++;
          } else {
            this.currentIndex = 0;
          }
        },

        prevCard() {
          if (this.currentIndex > 0) {
            this.currentIndex--;
          } else {
            this.currentIndex = this.cards.length - 1;
          }
        },
        
        shuffle() {
          for (let i = this.cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [this.cards[i], this.cards[j]] = [this.cards[j], this.cards[i]];
          }
        },
        
        flipAll() {
          const shouldFlip = !this.allFlipped;
          this.cards.forEach(card => card.flipped = shouldFlip);
        }
      };
    }
  </script>
  <a href="/" class="sticky bottom-0 block py-4 text-center bg-white/50 backdrop-blur-sm text-gray-700 font-medium">
    ← Home
  </a>
</body>
</html>
