<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiragana Flashcards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
  </style>
</head>
<body class="bg-gradient-to-br from-rose-50 to-indigo-100 min-h-screen grid grid-rows-[1fr_auto]" x-data="hiraganaApp()">
  <div class="container mx-auto px-2 py-6 sm:px-4 sm:py-8 w-full flex flex-col justify-center">
    <div class="text-center mb-6 sm:mb-8">
      <h1 class="text-3xl sm:text-4xl font-bold text-gray-800 mb-2">Hiragana Flashcards</h1>
      <p class="text-gray-600 text-sm sm:text-base">Click a card to flip Рђб <span x-text="flippedCount"></span> / <span x-text="cards.length"></span> flipped</p>
    </div>

    <div class="flex flex-wrap justify-center gap-2 sm:gap-4 mb-6">
      <button @click="shuffle()" class="px-4 sm:px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        Shuffle
      </button>
      <button @click="flipAll()" class="px-4 sm:px-6 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        <span x-show="!allFlipped">Flip All</span>
        <span x-show="allFlipped">Unflip All</span>
      </button>
      <button @click="layout = layout === 'grid' ? 'single' : 'grid'" class="px-4 sm:px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        <span x-show="layout === 'grid'">Single View</span>
        <span x-show="layout === 'single'">Grid View</span>
      </button>
      <button @click="toggleSoundMode()" class="px-4 sm:px-6 py-2 rounded-lg shadow transition-colors text-sm sm:text-base"
              :class="showText ? 'bg-amber-500 hover:bg-amber-600 text-white' : 'bg-purple-600 hover:bg-purple-700 text-white'">
        <span x-show="showText">Romaji</span>
        <span x-show="!showText">Sound ­Ъћі</span>
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-1 sm:gap-2 mb-6">
      <button @click="toggleFilter('basic')" 
              class="px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="filters.basic ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Basic <span x-text="basicCount"></span>
      </button>
      <button @click="toggleFilter('dakuon')" 
              class="px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="filters.dakuon ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Dakuon <span x-text="dakuonCount"></span>
      </button>
      <button @click="toggleFilter('handakuon')" 
              class="px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="filters.handakuon ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Handakuon <span x-text="handakuonCount"></span>
      </button>
      <button @click="toggleFilter('youon')" 
              class="px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="filters.youon ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Youon <span x-text="youonCount"></span>
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-2 sm:gap-3" x-show="layout === 'grid'">
      <template x-for="(card, index) in cards" :key="index">
        <div class="perspective-1000 w-20 h-28 sm:w-32 sm:h-44 cursor-pointer" @click="flipCard(index)">
          <div class="transform-style-3d w-full h-full relative transition-transform duration-300" 
               :class="card.flipped ? 'rotate-y-180' : ''">
            
            <div class="absolute w-full h-full backface-hidden bg-white rounded-xl shadow-lg flex items-center justify-center border-2 border-gray-300 p-2">
              <span class="text-4xl sm:text-5xl text-gray-800" x-text="card.hiragana"></span>
            </div>
            
            <div class="absolute w-full h-full backface-hidden bg-rose-500 rounded-xl shadow-lg flex flex-col items-center justify-center border-2 border-rose-300 rotate-y-180 cursor-pointer"
                 @click.stop="showText ? flipCard(index) : playSoundFromCard(card)">
              <span class="text-2xl sm:text-3xl text-white font-semibold" 
                    x-text="showText ? card.romaji : '­Ъћі'"></span>
              <span x-show="!showText" @click.stop="flipCard(index)" class="text-2xl mt-2 text-white/70 hover:text-white cursor-pointer">­Ъћё</span>
            </div>
            
          </div>
        </div>
      </template>
    </div>

    <div x-show="layout === 'single'" x-cloak class="flex flex-col items-center">
      <div class="perspective-1000 w-48 h-64 sm:w-64 sm:h-80 cursor-pointer mb-6" @click="toggleCurrentCard()">
        <div class="transform-style-3d w-full h-full relative transition-transform duration-300" 
             :class="currentCard?.flipped ? 'rotate-y-180' : ''">
          
          <div class="absolute w-full h-full backface-hidden bg-white rounded-2xl shadow-2xl flex items-center justify-center border-4 border-gray-300 p-4">
            <span class="text-7xl sm:text-8xl text-gray-800" x-text="currentCard?.hiragana"></span>
          </div>
          
          <div class="absolute w-full h-full backface-hidden bg-rose-500 rounded-2xl shadow-2xl flex flex-col items-center justify-center border-4 border-rose-300 rotate-y-180 cursor-pointer"
               @click.stop="showText ? toggleCurrentCard() : playSoundFromCard(currentCard)">
            <span class="text-4xl sm:text-5xl text-white font-semibold" 
                  x-text="showText ? currentCard?.romaji : '­Ъћі'"></span>
            <span x-show="!showText" @click.stop="toggleCurrentCard()" class="text-4xl mt-4 text-white/70 hover:text-white cursor-pointer">­Ъћё</span>
          </div>
          
        </div>
      </div>
      
      <div class="flex items-center gap-4">
        <button @click="prevCard()" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-lg">
          Рєљ Prev
        </button>
        <span class="text-gray-600 font-medium min-w-[80px] text-center" x-text="(currentIndex + 1) + ' / ' + cards.length"></span>
        <button @click="nextCard()" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-lg">
          Next Рєњ
        </button>
      </div>
    </div>
  </div>

  <script>
    function hiraganaApp() {
      const categories = {
        basic: ['сЂѓ','сЂё','сЂє','сЂѕ','сЂі','сЂІ','сЂЇ','сЂЈ','сЂЉ','сЂЊ','сЂЋ','сЂЌ','сЂЎ','сЂЏ','сЂЮ','сЂЪ','сЂА','сЂц','сЂд','сЂе','сЂф','сЂФ','сЂг','сЂГ','сЂ«','сЂ»','сЂ▓','сЂх','сЂИ','сЂ╗','сЂЙ','сЂ┐','сѓђ','сѓЂ','сѓѓ','сѓё','сѓє','сѓѕ','сѓЅ','сѓі','сѓІ','сѓї','сѓЇ','сѓЈ','сѓњ','сѓЊ'],
        dakuon: ['сЂї','сЂј','сЂљ','сЂњ','сЂћ','сЂќ','сЂў','сЂџ','сЂю','сЂъ','сЂа','сЂб','сЂЦ','сЂД','сЂЕ','сЂ░','сЂ│','сЂХ','сЂ╣','сЂ╝'],
        handakuon: ['сЂ▒','сЂ┤','сЂи','сЂ║','сЂй'],
        youon: ['сЂЇсѓЃ','сЂЇсѓЁ','сЂЇсѓЄ','сЂЌсѓЃ','сЂЌсѓЁ','сЂЌсѓЄ','сЂАсѓЃ','сЂАсѓЁ','сЂАсѓЄ','сЂФсѓЃ','сЂФсѓЁ','сЂФсѓЄ','сЂ▓сѓЃ','сЂ▓сѓЁ','сЂ▓сѓЄ','сЂ┐сѓЃ','сЂ┐сѓЁ','сЂ┐сѓЄ','сѓісѓЃ','сѓісѓЁ','сѓісѓЄ','сЂјсѓЃ','сЂјсѓЁ','сЂјсѓЄ','сЂўсѓЃ','сЂўсѓЁ','сЂўсѓЄ','сЂ│сѓЃ','сЂ│сѓЁ','сЂ│сѓЄ','сЂ┤сѓЃ','сЂ┤сѓЁ','сЂ┤сѓЄ']
      };

      const hiraganaData = [
        { hiragana: 'сЂѓ', romaji: 'a', category: 'basic' }, { hiragana: 'сЂё', romaji: 'i', category: 'basic' }, { hiragana: 'сЂє', romaji: 'u', category: 'basic' },
        { hiragana: 'сЂѕ', romaji: 'e', category: 'basic' }, { hiragana: 'сЂі', romaji: 'o', category: 'basic' },
        { hiragana: 'сЂІ', romaji: 'ka', category: 'basic' }, { hiragana: 'сЂЇ', romaji: 'ki', category: 'basic' }, { hiragana: 'сЂЈ', romaji: 'ku', category: 'basic' },
        { hiragana: 'сЂЉ', romaji: 'ke', category: 'basic' }, { hiragana: 'сЂЊ', romaji: 'ko', category: 'basic' },
        { hiragana: 'сЂЋ', romaji: 'sa', category: 'basic' }, { hiragana: 'сЂЌ', romaji: 'shi', category: 'basic' }, { hiragana: 'сЂЎ', romaji: 'su', category: 'basic' },
        { hiragana: 'сЂЏ', romaji: 'se', category: 'basic' }, { hiragana: 'сЂЮ', romaji: 'so', category: 'basic' },
        { hiragana: 'сЂЪ', romaji: 'ta', category: 'basic' }, { hiragana: 'сЂА', romaji: 'chi', category: 'basic' }, { hiragana: 'сЂц', romaji: 'tsu', category: 'basic' },
        { hiragana: 'сЂд', romaji: 'te', category: 'basic' }, { hiragana: 'сЂе', romaji: 'to', category: 'basic' },
        { hiragana: 'сЂф', romaji: 'na', category: 'basic' }, { hiragana: 'сЂФ', romaji: 'ni', category: 'basic' }, { hiragana: 'сЂг', romaji: 'nu', category: 'basic' },
        { hiragana: 'сЂГ', romaji: 'ne', category: 'basic' }, { hiragana: 'сЂ«', romaji: 'no', category: 'basic' },
        { hiragana: 'сЂ»', romaji: 'ha', category: 'basic' }, { hiragana: 'сЂ▓', romaji: 'hi', category: 'basic' }, { hiragana: 'сЂх', romaji: 'fu', category: 'basic' },
        { hiragana: 'сЂИ', romaji: 'he', category: 'basic' }, { hiragana: 'сЂ╗', romaji: 'ho', category: 'basic' },
        { hiragana: 'сЂЙ', romaji: 'ma', category: 'basic' }, { hiragana: 'сЂ┐', romaji: 'mi', category: 'basic' }, { hiragana: 'сѓђ', romaji: 'mu', category: 'basic' },
        { hiragana: 'сѓЂ', romaji: 'me', category: 'basic' }, { hiragana: 'сѓѓ', romaji: 'mo', category: 'basic' },
        { hiragana: 'сѓё', romaji: 'ya', category: 'basic' }, { hiragana: 'сѓє', romaji: 'yu', category: 'basic' }, { hiragana: 'сѓѕ', romaji: 'yo', category: 'basic' },
        { hiragana: 'сѓЅ', romaji: 'ra', category: 'basic' }, { hiragana: 'сѓі', romaji: 'ri', category: 'basic' }, { hiragana: 'сѓІ', romaji: 'ru', category: 'basic' },
        { hiragana: 'сѓї', romaji: 're', category: 'basic' }, { hiragana: 'сѓЇ', romaji: 'ro', category: 'basic' }, { hiragana: 'сѓЈ', romaji: 'wa', category: 'basic' }, { hiragana: 'сѓњ', romaji: 'wo', category: 'basic' },
        { hiragana: 'сѓЊ', romaji: 'n', category: 'basic' },
        { hiragana: 'сЂї', romaji: 'ga', category: 'dakuon' }, { hiragana: 'сЂј', romaji: 'gi', category: 'dakuon' }, { hiragana: 'сЂљ', romaji: 'gu', category: 'dakuon' },
        { hiragana: 'сЂњ', romaji: 'ge', category: 'dakuon' }, { hiragana: 'сЂћ', romaji: 'go', category: 'dakuon' },
        { hiragana: 'сЂќ', romaji: 'za', category: 'dakuon' }, { hiragana: 'сЂў', romaji: 'ji', category: 'dakuon' }, { hiragana: 'сЂџ', romaji: 'zu', category: 'dakuon' },
        { hiragana: 'сЂю', romaji: 'ze', category: 'dakuon' }, { hiragana: 'сЂъ', romaji: 'zo', category: 'dakuon' },
        { hiragana: 'сЂа', romaji: 'da', category: 'dakuon' }, { hiragana: 'сЂб', romaji: 'ji', category: 'dakuon' }, { hiragana: 'сЂЦ', romaji: 'zu', category: 'dakuon' },
        { hiragana: 'сЂД', romaji: 'de', category: 'dakuon' }, { hiragana: 'сЂЕ', romaji: 'do', category: 'dakuon' },
        { hiragana: 'сЂ░', romaji: 'ba', category: 'dakuon' }, { hiragana: 'сЂ│', romaji: 'bi', category: 'dakuon' }, { hiragana: 'сЂХ', romaji: 'bu', category: 'dakuon' },
        { hiragana: 'сЂ╣', romaji: 'be', category: 'dakuon' }, { hiragana: 'сЂ╝', romaji: 'bo', category: 'dakuon' },
        { hiragana: 'сЂ▒', romaji: 'pa', category: 'handakuon' }, { hiragana: 'сЂ┤', romaji: 'pi', category: 'handakuon' }, { hiragana: 'сЂи', romaji: 'pu', category: 'handakuon' },
        { hiragana: 'сЂ║', romaji: 'pe', category: 'handakuon' }, { hiragana: 'сЂй', romaji: 'po', category: 'handakuon' },
        { hiragana: 'сЂЇсѓЃ', romaji: 'kya', category: 'youon' }, { hiragana: 'сЂЇсѓЁ', romaji: 'kyu', category: 'youon' }, { hiragana: 'сЂЇсѓЄ', romaji: 'kyo', category: 'youon' },
        { hiragana: 'сЂЌсѓЃ', romaji: 'sha', category: 'youon' }, { hiragana: 'сЂЌсѓЁ', romaji: 'shu', category: 'youon' }, { hiragana: 'сЂЌсѓЄ', romaji: 'sho', category: 'youon' },
        { hiragana: 'сЂАсѓЃ', romaji: 'cha', category: 'youon' }, { hiragana: 'сЂАсѓЁ', romaji: 'chu', category: 'youon' }, { hiragana: 'сЂАсѓЄ', romaji: 'cho', category: 'youon' },
        { hiragana: 'сЂФсѓЃ', romaji: 'nya', category: 'youon' }, { hiragana: 'сЂФсѓЁ', romaji: 'nyu', category: 'youon' }, { hiragana: 'сЂФсѓЄ', romaji: 'nyo', category: 'youon' },
        { hiragana: 'сЂ▓сѓЃ', romaji: 'hya', category: 'youon' }, { hiragana: 'сЂ▓сѓЁ', romaji: 'hyu', category: 'youon' }, { hiragana: 'сЂ▓сѓЄ', romaji: 'hyo', category: 'youon' },
        { hiragana: 'сЂ┐сѓЃ', romaji: 'mya', category: 'youon' }, { hiragana: 'сЂ┐сѓЁ', romaji: 'myu', category: 'youon' }, { hiragana: 'сЂ┐сѓЄ', romaji: 'myo', category: 'youon' },
        { hiragana: 'сѓісѓЃ', romaji: 'rya', category: 'youon' }, { hiragana: 'сѓісѓЁ', romaji: 'ryu', category: 'youon' }, { hiragana: 'сѓісѓЄ', romaji: 'ryo', category: 'youon' },
        { hiragana: 'сЂјсѓЃ', romaji: 'gya', category: 'youon' }, { hiragana: 'сЂјсѓЁ', romaji: 'gyu', category: 'youon' }, { hiragana: 'сЂјсѓЄ', romaji: 'gyo', category: 'youon' },
        { hiragana: 'сЂўсѓЃ', romaji: 'ja', category: 'youon' }, { hiragana: 'сЂўсѓЁ', romaji: 'ju', category: 'youon' }, { hiragana: 'сЂўсѓЄ', romaji: 'jo', category: 'youon' },
        { hiragana: 'сЂ│сѓЃ', romaji: 'bya', category: 'youon' }, { hiragana: 'сЂ│сѓЁ', romaji: 'byu', category: 'youon' }, { hiragana: 'сЂ│сѓЄ', romaji: 'byo', category: 'youon' },
        { hiragana: 'сЂ┤сѓЃ', romaji: 'pya', category: 'youon' }, { hiragana: 'сЂ┤сѓЁ', romaji: 'pyu', category: 'youon' }, { hiragana: 'сЂ┤сѓЄ', romaji: 'pyo', category: 'youon' }
      ];

      return {
        allCards: hiraganaData.map(item => ({ ...item, flipped: false })),
        filters: { basic: true, dakuon: true, handakuon: true, youon: true },
        layout: 'grid',
        currentIndex: 0,
        showText: false,

        init() {
          document.addEventListener('keydown', (e) => {
            if (this.layout !== 'single') return;
            if (e.key === 'ArrowLeft') this.prevCard();
            if (e.key === 'ArrowRight') this.nextCard();
            if (e.key === ' ') {
              e.preventDefault();
              document.activeElement.blur();
              if (!this.showText) this.playSoundFromCard(this.currentCard);
            }
          });
        },

        get cards() {
          return this.allCards.filter(card => this.filters[card.category]);
        },

        get currentCard() {
          return this.cards[this.currentIndex] || null;
        },

        get basicCount() { return this.allCards.filter(c => c.category === 'basic').length; },
        get dakuonCount() { return this.allCards.filter(c => c.category === 'dakuon').length; },
        get handakuonCount() { return this.allCards.filter(c => c.category === 'handakuon').length; },
        get youonCount() { return this.allCards.filter(c => c.category === 'youon').length; },
        
        get flippedCount() {
          return this.cards.filter(c => c.flipped).length;
        },
        
        get allFlipped() {
          return this.flippedCount === this.cards.length;
        },

        toggleFilter(filter) {
          this.filters[filter] = !this.filters[filter];
          this.currentIndex = 0;
        },

        flipCard(index) {
          const card = this.cards[index];
          card.flipped = !card.flipped;
        },

        toggleCurrentCard() {
          if (this.currentCard) {
            this.currentCard.flipped = !this.currentCard.flipped;
          }
        },

        nextCard() {
          if (this.currentIndex < this.cards.length - 1) {
            this.currentIndex++;
          } else {
            this.currentIndex = 0;
          }
          if (!this.showText) {
            this.playSoundFromCard(this.currentCard);
          }
        },

        prevCard() {
          if (this.currentIndex > 0) {
            this.currentIndex--;
          } else {
            this.currentIndex = this.cards.length - 1;
          }
          if (!this.showText) {
            this.playSoundFromCard(this.currentCard);
          }
        },
        
        shuffle() {
          const visibleCards = this.cards;
          for (let i = visibleCards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const cardI = visibleCards[i];
            const cardJ = visibleCards[j];
            const idxI = this.allCards.indexOf(cardI);
            const idxJ = this.allCards.indexOf(cardJ);
            [this.allCards[idxI], this.allCards[idxJ]] = [this.allCards[idxJ], this.allCards[idxI]];
          }
        },
        
        flipAll() {
          const shouldFlip = !this.allFlipped;
          this.cards.forEach(card => card.flipped = shouldFlip);
        },

        toggleSoundMode() {
          this.showText = !this.showText;
          if (!this.showText && this.layout === 'single') {
            this.playSoundFromCard(this.currentCard);
          }
        },

        playSoundFromCard(card) {
          if (!card) return;
          const filename = card.hiragana + '.mp3';
          const audioUrl = `google-tts/hiragana/${filename}`;
          const audio = new Audio(audioUrl);
          audio.play().catch(err => console.log('Playback failed:', err));
        }
      };
    }
  </script>
  <a href="/" class="sticky bottom-0 block py-4 text-center bg-white/50 backdrop-blur-sm text-gray-700 font-medium">
    Рєљ Home
  </a>
</body>
</html>
