<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiragana Flashcards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
  </style>
</head>
<body class="bg-gradient-to-br from-rose-50 to-indigo-100 min-h-screen grid grid-rows-[1fr_auto]" x-data="hiraganaApp()">
  <div class="container mx-auto px-2 py-6 sm:px-4 sm:py-8 w-full flex flex-col justify-center">
    <div class="text-center mb-6 sm:mb-8">
      <h1 class="text-3xl sm:text-4xl font-bold text-gray-800 mb-2">Hiragana Flashcards</h1>
      <p class="text-gray-600 text-sm sm:text-base">Click a card to flip тАв <span x-text="flippedCount"></span> / <span x-text="cards.length"></span> flipped</p>
    </div>

    <div class="flex flex-wrap justify-center gap-2 sm:gap-4 mb-6">
      <button @click="shuffle()" class="px-4 sm:px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        Shuffle
      </button>
      <button @click="flipAll()" class="px-4 sm:px-6 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        <span x-show="!allFlipped">Flip All</span>
        <span x-show="allFlipped">Unflip All</span>
      </button>
      <button @click="layout = layout === 'grid' ? 'single' : 'grid'" class="px-4 sm:px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        <span x-show="layout === 'grid'">Single View</span>
        <span x-show="layout === 'single'">Grid View</span>
      </button>
      <button @click="toggleSoundMode()" class="px-4 sm:px-6 py-2 rounded-lg shadow transition-colors text-sm sm:text-base"
              :class="showText ? 'bg-amber-500 hover:bg-amber-600 text-white' : 'bg-purple-600 hover:bg-purple-700 text-white'">
        <span x-show="showText">Romaji</span>
        <span x-show="!showText">Sound ЁЯФК</span>
      </button>
      <button x-show="!showText" @click="cycleVoice()" class="px-4 py-2 rounded-lg shadow bg-purple-600 hover:bg-purple-700 text-white text-sm">
        <span x-text="voiceLabel"></span> тЖ╗
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-1 sm:gap-2 mb-6">
      <button @click="toggleFilter('basic')" 
              class="px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="filters.basic ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Basic <span x-text="basicCount"></span>
      </button>
      <button @click="toggleFilter('dakuon')" 
              class="px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="filters.dakuon ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Dakuon <span x-text="dakuonCount"></span>
      </button>
      <button @click="toggleFilter('handakuon')" 
              class="px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="filters.handakuon ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Handakuon <span x-text="handakuonCount"></span>
      </button>
      <button @click="toggleFilter('youon')" 
              class="px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="filters.youon ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        Youon <span x-text="youonCount"></span>
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-2 sm:gap-3" x-show="layout === 'grid'">
      <template x-for="(card, index) in cards" :key="index">
        <div class="perspective-1000 w-20 h-28 sm:w-32 sm:h-44 cursor-pointer" @click="flipCard(index)">
          <div class="transform-style-3d w-full h-full relative transition-transform duration-300" 
               :class="card.flipped ? 'rotate-y-180' : ''">
            
            <div class="absolute w-full h-full backface-hidden bg-white rounded-xl shadow-lg flex items-center justify-center border-2 border-gray-300 p-2">
              <span class="text-4xl sm:text-5xl text-gray-800" x-text="card.hiragana"></span>
            </div>
            
            <div class="absolute w-full h-full backface-hidden bg-rose-500 rounded-xl shadow-lg flex flex-col items-center justify-center border-2 border-rose-300 rotate-y-180 cursor-pointer"
                 @click.stop="showText ? flipCard(index) : playSoundFromCard(card)">
              <span class="text-2xl sm:text-3xl text-white font-semibold" 
                    x-text="showText ? card.romaji : 'ЁЯФК'"></span>
              <span x-show="!showText" @click.stop="flipCard(index)" class="text-2xl mt-2 text-white/70 hover:text-white cursor-pointer">ЁЯФД</span>
            </div>
            
          </div>
        </div>
      </template>
    </div>

    <div x-show="layout === 'single'" x-cloak class="flex flex-col items-center">
      <div class="perspective-1000 w-48 h-64 sm:w-64 sm:h-80 cursor-pointer mb-6" @click="toggleCurrentCard()">
        <div class="transform-style-3d w-full h-full relative transition-transform duration-300" 
             :class="currentCard?.flipped ? 'rotate-y-180' : ''">
          
          <div class="absolute w-full h-full backface-hidden bg-white rounded-2xl shadow-2xl flex items-center justify-center border-4 border-gray-300 p-4">
            <span class="text-7xl sm:text-8xl text-gray-800" x-text="currentCard?.hiragana"></span>
          </div>
          
          <div class="absolute w-full h-full backface-hidden bg-rose-500 rounded-2xl shadow-2xl flex flex-col items-center justify-center border-4 border-rose-300 rotate-y-180 cursor-pointer"
               @click.stop="showText ? toggleCurrentCard() : playSoundFromCard(currentCard)">
            <span class="text-4xl sm:text-5xl text-white font-semibold" 
                  x-text="showText ? currentCard?.romaji : 'ЁЯФК'"></span>
            <span x-show="!showText" @click.stop="toggleCurrentCard()" class="text-4xl mt-4 text-white/70 hover:text-white cursor-pointer">ЁЯФД</span>
          </div>
          
        </div>
      </div>
      
      <div class="flex flex-col items-center gap-2">
        <div class="flex items-center gap-4">
          <button @click="prevCard()" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-lg">
            тЖР Prev
          </button>
          <button x-show="!showText" @click="playSoundFromCard(currentCard)" class="px-8 py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-lg shadow transition-colors text-lg">
            ЁЯФК Listen
          </button>
          <button @click="nextCard()" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-lg">
            Next тЖТ
          </button>
        </div>
        <span class="text-gray-600 font-medium" x-text="(currentIndex + 1) + ' / ' + cards.length"></span>
      </div>
    </div>
  </div>

  <script>
    function hiraganaApp() {
      const categories = {
        basic: ['уБВ','уБД','уБЖ','уБИ','уБК','уБЛ','уБН','уБП','уБС','уБУ','уБХ','уБЧ','уБЩ','уБЫ','уБЭ','уБЯ','уБб','уБд','уБж','уБи','уБк','уБл','уБм','уБн','уБо','уБп','уБ▓','уБ╡','уБ╕','уБ╗','уБ╛','уБ┐','уВА','уВБ','уВВ','уВД','уВЖ','уВИ','уВЙ','уВК','уВЛ','уВМ','уВН','уВП','уВТ','уВУ'],
        dakuon: ['уБМ','уБО','уБР','уБТ','уБФ','уБЦ','уБШ','уБЪ','уБЬ','уБЮ','уБа','уБв','уБе','уБз','уБй','уБ░','уБ│','уБ╢','уБ╣','уБ╝'],
        handakuon: ['уБ▒','уБ┤','уБ╖','уБ║','уБ╜'],
        youon: ['уБНуВГ','уБНуВЕ','уБНуВЗ','уБЧуВГ','уБЧуВЕ','уБЧуВЗ','уБбуВГ','уБбуВЕ','уБбуВЗ','уБлуВГ','уБлуВЕ','уБлуВЗ','уБ▓уВГ','уБ▓уВЕ','уБ▓уВЗ','уБ┐уВГ','уБ┐уВЕ','уБ┐уВЗ','уВКуВГ','уВКуВЕ','уВКуВЗ','уБОуВГ','уБОуВЕ','уБОуВЗ','уБШуВГ','уБШуВЕ','уБШуВЗ','уБ│уВГ','уБ│уВЕ','уБ│уВЗ','уБ┤уВГ','уБ┤уВЕ','уБ┤уВЗ']
      };

      const hiraganaData = [
        { hiragana: 'уБВ', romaji: 'a', category: 'basic' }, { hiragana: 'уБД', romaji: 'i', category: 'basic' }, { hiragana: 'уБЖ', romaji: 'u', category: 'basic' },
        { hiragana: 'уБИ', romaji: 'e', category: 'basic' }, { hiragana: 'уБК', romaji: 'o', category: 'basic' },
        { hiragana: 'уБЛ', romaji: 'ka', category: 'basic' }, { hiragana: 'уБН', romaji: 'ki', category: 'basic' }, { hiragana: 'уБП', romaji: 'ku', category: 'basic' },
        { hiragana: 'уБС', romaji: 'ke', category: 'basic' }, { hiragana: 'уБУ', romaji: 'ko', category: 'basic' },
        { hiragana: 'уБХ', romaji: 'sa', category: 'basic' }, { hiragana: 'уБЧ', romaji: 'shi', category: 'basic' }, { hiragana: 'уБЩ', romaji: 'su', category: 'basic' },
        { hiragana: 'уБЫ', romaji: 'se', category: 'basic' }, { hiragana: 'уБЭ', romaji: 'so', category: 'basic' },
        { hiragana: 'уБЯ', romaji: 'ta', category: 'basic' }, { hiragana: 'уБб', romaji: 'chi', category: 'basic' }, { hiragana: 'уБд', romaji: 'tsu', category: 'basic' },
        { hiragana: 'уБж', romaji: 'te', category: 'basic' }, { hiragana: 'уБи', romaji: 'to', category: 'basic' },
        { hiragana: 'уБк', romaji: 'na', category: 'basic' }, { hiragana: 'уБл', romaji: 'ni', category: 'basic' }, { hiragana: 'уБм', romaji: 'nu', category: 'basic' },
        { hiragana: 'уБн', romaji: 'ne', category: 'basic' }, { hiragana: 'уБо', romaji: 'no', category: 'basic' },
        { hiragana: 'уБп', romaji: 'ha', category: 'basic' }, { hiragana: 'уБ▓', romaji: 'hi', category: 'basic' }, { hiragana: 'уБ╡', romaji: 'fu', category: 'basic' },
        { hiragana: 'уБ╕', romaji: 'he', category: 'basic' }, { hiragana: 'уБ╗', romaji: 'ho', category: 'basic' },
        { hiragana: 'уБ╛', romaji: 'ma', category: 'basic' }, { hiragana: 'уБ┐', romaji: 'mi', category: 'basic' }, { hiragana: 'уВА', romaji: 'mu', category: 'basic' },
        { hiragana: 'уВБ', romaji: 'me', category: 'basic' }, { hiragana: 'уВВ', romaji: 'mo', category: 'basic' },
        { hiragana: 'уВД', romaji: 'ya', category: 'basic' }, { hiragana: 'уВЖ', romaji: 'yu', category: 'basic' }, { hiragana: 'уВИ', romaji: 'yo', category: 'basic' },
        { hiragana: 'уВЙ', romaji: 'ra', category: 'basic' }, { hiragana: 'уВК', romaji: 'ri', category: 'basic' }, { hiragana: 'уВЛ', romaji: 'ru', category: 'basic' },
        { hiragana: 'уВМ', romaji: 're', category: 'basic' }, { hiragana: 'уВН', romaji: 'ro', category: 'basic' }, { hiragana: 'уВП', romaji: 'wa', category: 'basic' }, { hiragana: 'уВТ', romaji: 'wo', category: 'basic' },
        { hiragana: 'уВУ', romaji: 'n', category: 'basic' },
        { hiragana: 'уБМ', romaji: 'ga', category: 'dakuon' }, { hiragana: 'уБО', romaji: 'gi', category: 'dakuon' }, { hiragana: 'уБР', romaji: 'gu', category: 'dakuon' },
        { hiragana: 'уБТ', romaji: 'ge', category: 'dakuon' }, { hiragana: 'уБФ', romaji: 'go', category: 'dakuon' },
        { hiragana: 'уБЦ', romaji: 'za', category: 'dakuon' }, { hiragana: 'уБШ', romaji: 'ji', category: 'dakuon' }, { hiragana: 'уБЪ', romaji: 'zu', category: 'dakuon' },
        { hiragana: 'уБЬ', romaji: 'ze', category: 'dakuon' }, { hiragana: 'уБЮ', romaji: 'zo', category: 'dakuon' },
        { hiragana: 'уБа', romaji: 'da', category: 'dakuon' }, { hiragana: 'уБв', romaji: 'ji', category: 'dakuon' }, { hiragana: 'уБе', romaji: 'zu', category: 'dakuon' },
        { hiragana: 'уБз', romaji: 'de', category: 'dakuon' }, { hiragana: 'уБй', romaji: 'do', category: 'dakuon' },
        { hiragana: 'уБ░', romaji: 'ba', category: 'dakuon' }, { hiragana: 'уБ│', romaji: 'bi', category: 'dakuon' }, { hiragana: 'уБ╢', romaji: 'bu', category: 'dakuon' },
        { hiragana: 'уБ╣', romaji: 'be', category: 'dakuon' }, { hiragana: 'уБ╝', romaji: 'bo', category: 'dakuon' },
        { hiragana: 'уБ▒', romaji: 'pa', category: 'handakuon' }, { hiragana: 'уБ┤', romaji: 'pi', category: 'handakuon' }, { hiragana: 'уБ╖', romaji: 'pu', category: 'handakuon' },
        { hiragana: 'уБ║', romaji: 'pe', category: 'handakuon' }, { hiragana: 'уБ╜', romaji: 'po', category: 'handakuon' },
        { hiragana: 'уБНуВГ', romaji: 'kya', category: 'youon' }, { hiragana: 'уБНуВЕ', romaji: 'kyu', category: 'youon' }, { hiragana: 'уБНуВЗ', romaji: 'kyo', category: 'youon' },
        { hiragana: 'уБЧуВГ', romaji: 'sha', category: 'youon' }, { hiragana: 'уБЧуВЕ', romaji: 'shu', category: 'youon' }, { hiragana: 'уБЧуВЗ', romaji: 'sho', category: 'youon' },
        { hiragana: 'уБбуВГ', romaji: 'cha', category: 'youon' }, { hiragana: 'уБбуВЕ', romaji: 'chu', category: 'youon' }, { hiragana: 'уБбуВЗ', romaji: 'cho', category: 'youon' },
        { hiragana: 'уБлуВГ', romaji: 'nya', category: 'youon' }, { hiragana: 'уБлуВЕ', romaji: 'nyu', category: 'youon' }, { hiragana: 'уБлуВЗ', romaji: 'nyo', category: 'youon' },
        { hiragana: 'уБ▓уВГ', romaji: 'hya', category: 'youon' }, { hiragana: 'уБ▓уВЕ', romaji: 'hyu', category: 'youon' }, { hiragana: 'уБ▓уВЗ', romaji: 'hyo', category: 'youon' },
        { hiragana: 'уБ┐уВГ', romaji: 'mya', category: 'youon' }, { hiragana: 'уБ┐уВЕ', romaji: 'myu', category: 'youon' }, { hiragana: 'уБ┐уВЗ', romaji: 'myo', category: 'youon' },
        { hiragana: 'уВКуВГ', romaji: 'rya', category: 'youon' }, { hiragana: 'уВКуВЕ', romaji: 'ryu', category: 'youon' }, { hiragana: 'уВКуВЗ', romaji: 'ryo', category: 'youon' },
        { hiragana: 'уБОуВГ', romaji: 'gya', category: 'youon' }, { hiragana: 'уБОуВЕ', romaji: 'gyu', category: 'youon' }, { hiragana: 'уБОуВЗ', romaji: 'gyo', category: 'youon' },
        { hiragana: 'уБШуВГ', romaji: 'ja', category: 'youon' }, { hiragana: 'уБШуВЕ', romaji: 'ju', category: 'youon' }, { hiragana: 'уБШуВЗ', romaji: 'jo', category: 'youon' },
        { hiragana: 'уБ│уВГ', romaji: 'bya', category: 'youon' }, { hiragana: 'уБ│уВЕ', romaji: 'byu', category: 'youon' }, { hiragana: 'уБ│уВЗ', romaji: 'byo', category: 'youon' },
        { hiragana: 'уБ┤уВГ', romaji: 'pya', category: 'youon' }, { hiragana: 'уБ┤уВЕ', romaji: 'pyu', category: 'youon' }, { hiragana: 'уБ┤уВЗ', romaji: 'pyo', category: 'youon' }
      ];

      return {
        allCards: hiraganaData.map(item => ({ ...item, flipped: false })),
        filters: { basic: true, dakuon: true, handakuon: true, youon: true },
        layout: 'grid',
        currentIndex: 0,
        showText: false,
        selectedVoice: 'edge-tts-nanami',
        voices: [
          { id: 'edge-tts-nanami', label: 'Nanami' },
          { id: 'google-tts', label: 'Google' },
          { id: 'edge-tts-keita', label: 'Keita' }
        ],

        init() {
          document.addEventListener('keydown', (e) => {
            if (this.layout !== 'single') return;
            if (e.key === 'ArrowLeft') this.prevCard();
            if (e.key === 'ArrowRight') this.nextCard();
            if (e.key === ' ') {
              e.preventDefault();
              document.activeElement.blur();
              if (!this.showText) this.playSoundFromCard(this.currentCard);
            }
          });
        },

        get cards() {
          return this.allCards.filter(card => this.filters[card.category]);
        },

        get currentCard() {
          return this.cards[this.currentIndex] || null;
        },

        get basicCount() { return this.allCards.filter(c => c.category === 'basic').length; },
        get dakuonCount() { return this.allCards.filter(c => c.category === 'dakuon').length; },
        get handakuonCount() { return this.allCards.filter(c => c.category === 'handakuon').length; },
        get youonCount() { return this.allCards.filter(c => c.category === 'youon').length; },
        
        get flippedCount() {
          return this.cards.filter(c => c.flipped).length;
        },
        
        get allFlipped() {
          return this.flippedCount === this.cards.length;
        },

        get voiceLabel() {
          const voice = this.voices.find(v => v.id === this.selectedVoice);
          return voice ? voice.label : 'Voice';
        },

        cycleVoice() {
          const currentIndex = this.voices.findIndex(v => v.id === this.selectedVoice);
          const nextIndex = (currentIndex + 1) % this.voices.length;
          this.selectedVoice = this.voices[nextIndex].id;
        },

        toggleFilter(filter) {
          this.filters[filter] = !this.filters[filter];
          this.currentIndex = 0;
        },

        flipCard(index) {
          const card = this.cards[index];
          card.flipped = !card.flipped;
        },

        toggleCurrentCard() {
          if (this.currentCard) {
            this.currentCard.flipped = !this.currentCard.flipped;
          }
        },

        nextCard() {
          if (this.currentIndex < this.cards.length - 1) {
            this.currentIndex++;
          } else {
            this.currentIndex = 0;
          }
          if (!this.showText) {
            this.playSoundFromCard(this.currentCard);
          }
        },

        prevCard() {
          if (this.currentIndex > 0) {
            this.currentIndex--;
          } else {
            this.currentIndex = this.cards.length - 1;
          }
          if (!this.showText) {
            this.playSoundFromCard(this.currentCard);
          }
        },
        
        shuffle() {
          const visibleCards = this.cards;
          for (let i = visibleCards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const cardI = visibleCards[i];
            const cardJ = visibleCards[j];
            const idxI = this.allCards.indexOf(cardI);
            const idxJ = this.allCards.indexOf(cardJ);
            [this.allCards[idxI], this.allCards[idxJ]] = [this.allCards[idxJ], this.allCards[idxI]];
          }
        },
        
        flipAll() {
          const shouldFlip = !this.allFlipped;
          this.cards.forEach(card => card.flipped = shouldFlip);
        },

        toggleSoundMode() {
          this.showText = !this.showText;
          if (!this.showText && this.layout === 'single') {
            this.playSoundFromCard(this.currentCard);
          }
        },

        playSoundFromCard(card) {
          if (!card) return;
          const filename = card.hiragana + '.mp3';
          const audioUrl = `${this.selectedVoice}/hiragana/${filename}`;
          const audio = new Audio(audioUrl);
          audio.play().catch(err => console.log('Playback failed:', err));
        }
      };
    }
  </script>
  <a href="/" class="sticky bottom-0 block py-4 text-center bg-white/50 backdrop-blur-sm text-gray-700 font-medium">
    тЖР Home
  </a>
</body>
</html>
