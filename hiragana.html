<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiragana Flashcards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Instrument+Serif&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    .blob-1 { background-color: #f472b6; }
    .blob-2 { background-color: #fbbf24; }
  </style>
</head>
<body class="min-h-screen grid grid-rows-[1fr_auto]" x-data="hiraganaApp()">
  <div class="fixed-bg-blobs">
    <div class="blob-1"></div>
    <div class="blob-2"></div>
  </div>

  <div class="container mx-auto px-3 py-6 sm:px-6 sm:py-10 w-full flex flex-col justify-center">
    <header class="text-center mb-8 sm:mb-12 animate-in">
      <h1 class="font-serif text-3xl sm:text-5xl text-theme tracking-tight mb-2">Hiragana</h1>
      <p class="text-theme-secondary text-sm sm:text-base"><span x-text="flippedCount"></span> / <span x-text="cards.length"></span> revealed</p>
    </header>

    <div class="flex flex-wrap justify-center gap-2 sm:gap-3 mb-6 animate-in" style="animation-delay: 100ms;">
      <button @click="shuffle()" class="btn px-4 sm:px-6 py-2 text-sm font-medium">Shuffle</button>
      <button @click="flipAll()" class="btn px-4 sm:px-6 py-2 text-sm font-medium">
        <span x-show="!allFlipped">Reveal All</span>
        <span x-show="allFlipped">Hide All</span>
      </button>
      <button @click="toggleLayout()" class="btn px-4 sm:px-6 py-2 text-sm font-medium">
        <span x-show="layout === 'grid'">Single</span>
        <span x-show="layout === 'single'">Grid</span>
      </button>
      <button @click="toggleSoundMode()" class="btn px-4 sm:px-6 py-2 text-sm font-medium"
              :class="showText ? 'opacity-60' : ''">
        <span x-show="showText">Text</span>
        <span x-show="!showText">Sound</span>
      </button>
      <button x-show="!showText" @click="cycleVoice()" class="btn px-3 py-2 text-sm font-medium">
        <span x-text="voiceLabel"></span>
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-1.5 sm:gap-2 mb-8 animate-in" style="animation-delay: 150ms;">
      <button @click="toggleFilter('basic')" 
              class="tag transition-colors"
              :class="filters.basic ? 'bg-theme-inverse text-theme-inverse' : 'bg-theme text-theme-secondary'">
        Basic <span x-text="basicCount"></span>
      </button>
      <button @click="toggleFilter('dakuon')" 
              class="tag transition-colors"
              :class="filters.dakuon ? 'bg-theme-inverse text-theme-inverse' : 'bg-theme text-theme-secondary'">
        Dakuon <span x-text="dakuonCount"></span>
      </button>
      <button @click="toggleFilter('handakuon')" 
              class="tag transition-colors"
              :class="filters.handakuon ? 'bg-theme-inverse text-theme-inverse' : 'bg-theme text-theme-secondary'">
        Handakuon <span x-text="handakuonCount"></span>
      </button>
      <button @click="toggleFilter('youon')" 
              class="tag transition-colors"
              :class="filters.youon ? 'bg-theme-inverse text-theme-inverse' : 'bg-theme text-theme-secondary'">
        Youon <span x-text="youonCount"></span>
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-3 sm:gap-3" x-show="layout === 'grid'">
      <template x-for="(card, index) in cards" :key="index">
        <div class="perspective-1000 w-32 h-40 sm:w-32 sm:h-44 cursor-pointer" @click="flipCard(index)">
          <div class="transform-style-3d w-full h-full relative transition-transform duration-300" 
               :class="card.flipped ? 'rotate-y-180' : ''">
            
            <div class="absolute w-full h-full backface-hidden card-flash flex items-center justify-center p-2">
              <span class="text-4xl sm:text-5xl text-theme" x-text="card.hiragana"></span>
            </div>
            
            <div class="absolute w-full h-full backface-hidden card-back rounded-xl flex flex-col items-center justify-center p-2 rotate-y-180"
                 @click.stop="showText ? flipCard(index) : playSoundFromCard(card)">
              <span class="text-xl sm:text-2xl font-medium text-theme" 
                    x-text="showText ? card.romaji : ''"></span>
              <svg x-show="!showText" @click.stop="flipCard(index)" class="w-5 h-5 mt-2 text-theme-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
              </svg>
            </div>
            
          </div>
        </div>
      </template>
    </div>

    <div x-show="layout === 'single'" x-cloak class="flex flex-col items-center">
      <div class="perspective-1000 w-56 h-72 sm:w-72 sm:h-96 cursor-pointer mb-8" @click="toggleCurrentCard()">
        <div class="transform-style-3d w-full h-full relative transition-transform duration-300" 
             :class="currentCard?.flipped ? 'rotate-y-180' : ''">
          
          <div class="absolute w-full h-full backface-hidden card-flash flex items-center justify-center p-6">
            <span class="text-7xl sm:text-8xl text-theme" x-text="currentCard?.hiragana"></span>
          </div>
          
          <div class="absolute w-full h-full backface-hidden card-back rounded-2xl flex flex-col items-center justify-center p-6 rotate-y-180"
               @click.stop="showText ? toggleCurrentCard() : playSoundFromCard(currentCard)">
            <span class="text-4xl sm:text-5xl font-medium text-theme" 
                  x-text="showText ? currentCard?.romaji : ''"></span>
            <svg x-show="!showText" @click.stop="toggleCurrentCard()" class="w-6 h-6 mt-4 text-theme-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
            </svg>
          </div>
          
        </div>
      </div>
      
      <div class="flex flex-col items-center gap-4">
        <div class="flex items-center gap-3 sm:gap-4">
          <button @click="prevCard()" class="btn-outline px-5 py-2.5 text-sm font-medium">
            <svg class="w-4 h-4 inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            Prev
          </button>
          <button x-show="!showText" @click="playSoundFromCard(currentCard)" class="btn px-6 py-2.5 text-sm font-medium">
            <svg class="w-4 h-4 inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            Listen
          </button>
          <button @click="nextCard()" class="btn-outline px-5 py-2.5 text-sm font-medium">
            Next
            <svg class="w-4 h-4 inline ml-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
        <span class="text-xs text-theme-secondary font-mono" x-text="(currentIndex + 1) + ' / ' + cards.length"></span>
      </div>
    </div>
  </div>

  <a href="/" class="sticky-home">
    <span class="inline-flex items-center gap-2">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Home
    </span>
  </a>

  <script>
    function hiraganaApp() {
      const hiraganaData = [
        { hiragana: 'あ', romaji: 'a', category: 'basic' }, { hiragana: 'い', romaji: 'i', category: 'basic' }, { hiragana: 'う', romaji: 'u', category: 'basic' },
        { hiragana: 'え', romaji: 'e', category: 'basic' }, { hiragana: 'お', romaji: 'o', category: 'basic' },
        { hiragana: 'か', romaji: 'ka', category: 'basic' }, { hiragana: 'き', romaji: 'ki', category: 'basic' }, { hiragana: 'く', romaji: 'ku', category: 'basic' },
        { hiragana: 'け', romaji: 'ke', category: 'basic' }, { hiragana: 'こ', romaji: 'ko', category: 'basic' },
        { hiragana: 'さ', romaji: 'sa', category: 'basic' }, { hiragana: 'し', romaji: 'shi', category: 'basic' }, { hiragana: 'す', romaji: 'su', category: 'basic' },
        { hiragana: 'せ', romaji: 'se', category: 'basic' }, { hiragana: 'そ', romaji: 'so', category: 'basic' },
        { hiragana: 'た', romaji: 'ta', category: 'basic' }, { hiragana: 'ち', romaji: 'chi', category: 'basic' }, { hiragana: 'つ', romaji: 'tsu', category: 'basic' },
        { hiragana: 'て', romaji: 'te', category: 'basic' }, { hiragana: 'と', romaji: 'to', category: 'basic' },
        { hiragana: 'な', romaji: 'na', category: 'basic' }, { hiragana: 'に', romaji: 'ni', category: 'basic' }, { hiragana: 'ぬ', romaji: 'nu', category: 'basic' },
        { hiragana: 'ね', romaji: 'ne', category: 'basic' }, { hiragana: 'の', romaji: 'no', category: 'basic' },
        { hiragana: 'は', romaji: 'ha', category: 'basic' }, { hiragana: 'ひ', romaji: 'hi', category: 'basic' }, { hiragana: 'ふ', romaji: 'fu', category: 'basic' },
        { hiragana: 'へ', romaji: 'he', category: 'basic' }, { hiragana: 'ほ', romaji: 'ho', category: 'basic' },
        { hiragana: 'ま', romaji: 'ma', category: 'basic' }, { hiragana: 'み', romaji: 'mi', category: 'basic' }, { hiragana: 'む', romaji: 'mu', category: 'basic' },
        { hiragana: 'め', romaji: 'me', category: 'basic' }, { hiragana: 'も', romaji: 'mo', category: 'basic' },
        { hiragana: 'や', romaji: 'ya', category: 'basic' }, { hiragana: 'ゆ', romaji: 'yu', category: 'basic' }, { hiragana: 'よ', romaji: 'yo', category: 'basic' },
        { hiragana: 'ら', romaji: 'ra', category: 'basic' }, { hiragana: 'り', romaji: 'ri', category: 'basic' }, { hiragana: 'る', romaji: 'ru', category: 'basic' },
        { hiragana: 'れ', romaji: 're', category: 'basic' }, { hiragana: 'ろ', romaji: 'ro', category: 'basic' }, { hiragana: 'わ', romaji: 'wa', category: 'basic' }, { hiragana: 'を', romaji: 'wo', category: 'basic' },
        { hiragana: 'ん', romaji: 'n', category: 'basic' },
        { hiragana: 'が', romaji: 'ga', category: 'dakuon' }, { hiragana: 'ぎ', romaji: 'gi', category: 'dakuon' }, { hiragana: 'ぐ', romaji: 'gu', category: 'dakuon' },
        { hiragana: 'げ', romaji: 'ge', category: 'dakuon' }, { hiragana: 'ご', romaji: 'go', category: 'dakuon' },
        { hiragana: 'ざ', romaji: 'za', category: 'dakuon' }, { hiragana: 'じ', romaji: 'ji', category: 'dakuon' }, { hiragana: 'ず', romaji: 'zu', category: 'dakuon' },
        { hiragana: 'ぜ', romaji: 'ze', category: 'dakuon' }, { hiragana: 'ぞ', romaji: 'zo', category: 'dakuon' },
        { hiragana: 'だ', romaji: 'da', category: 'dakuon' }, { hiragana: 'ぢ', romaji: 'ji', category: 'dakuon' }, { hiragana: 'づ', romaji: 'zu', category: 'dakuon' },
        { hiragana: 'で', romaji: 'de', category: 'dakuon' }, { hiragana: 'ど', romaji: 'do', category: 'dakuon' },
        { hiragana: 'ば', romaji: 'ba', category: 'dakuon' }, { hiragana: 'び', romaji: 'bi', category: 'dakuon' }, { hiragana: 'ぶ', romaji: 'bu', category: 'dakuon' },
        { hiragana: 'べ', romaji: 'be', category: 'dakuon' }, { hiragana: 'ぼ', romaji: 'bo', category: 'dakuon' },
        { hiragana: 'ぱ', romaji: 'pa', category: 'handakuon' }, { hiragana: 'ぴ', romaji: 'pi', category: 'handakuon' }, { hiragana: 'ぷ', romaji: 'pu', category: 'handakuon' },
        { hiragana: 'ぺ', romaji: 'pe', category: 'handakuon' }, { hiragana: 'ぽ', romaji: 'po', category: 'handakuon' },
        { hiragana: 'きゃ', romaji: 'kya', category: 'youon' }, { hiragana: 'きゅ', romaji: 'kyu', category: 'youon' }, { hiragana: 'きょ', romaji: 'kyo', category: 'youon' },
        { hiragana: 'しゃ', romaji: 'sha', category: 'youon' }, { hiragana: 'しゅ', romaji: 'shu', category: 'youon' }, { hiragana: 'しょ', romaji: 'sho', category: 'youon' },
        { hiragana: 'ちゃ', romaji: 'cha', category: 'youon' }, { hiragana: 'ちゅ', romaji: 'chu', category: 'youon' }, { hiragana: 'ちょ', romaji: 'cho', category: 'youon' },
        { hiragana: 'にゃ', romaji: 'nya', category: 'youon' }, { hiragana: 'にゅ', romaji: 'nyu', category: 'youon' }, { hiragana: 'にょ', romaji: 'nyo', category: 'youon' },
        { hiragana: 'ひゃ', romaji: 'hya', category: 'youon' }, { hiragana: 'ひゅ', romaji: 'hyu', category: 'youon' }, { hiragana: 'ひょ', romaji: 'hyo', category: 'youon' },
        { hiragana: 'みゃ', romaji: 'mya', category: 'youon' }, { hiragana: 'みゅ', romaji: 'myu', category: 'youon' }, { hiragana: 'みょ', romaji: 'myo', category: 'youon' },
        { hiragana: 'りゃ', romaji: 'rya', category: 'youon' }, { hiragana: 'りゅ', romaji: 'ryu', category: 'youon' }, { hiragana: 'りょ', romaji: 'ryo', category: 'youon' },
        { hiragana: 'ぎゃ', romaji: 'gya', category: 'youon' }, { hiragana: 'ぎゅ', romaji: 'gyu', category: 'youon' }, { hiragana: 'ぎょ', romaji: 'gyo', category: 'youon' },
        { hiragana: 'じゃ', romaji: 'ja', category: 'youon' }, { hiragana: 'じゅ', romaji: 'ju', category: 'youon' }, { hiragana: 'じょ', romaji: 'jo', category: 'youon' },
        { hiragana: 'びゃ', romaji: 'bya', category: 'youon' }, { hiragana: 'びゅ', romaji: 'byu', category: 'youon' }, { hiragana: 'びょ', romaji: 'byo', category: 'youon' },
        { hiragana: 'ぴゃ', romaji: 'pya', category: 'youon' }, { hiragana: 'ぴゅ', romaji: 'pyu', category: 'youon' }, { hiragana: 'ぴょ', romaji: 'pyo', category: 'youon' }
      ];

      return {
        allCards: hiraganaData.map(item => ({ ...item, flipped: false })),
        filters: { basic: true, dakuon: true, handakuon: true, youon: true },
        layout: 'grid',
        currentIndex: 0,
        showText: false,
        selectedVoice: 'edge-tts-nanami',
        voices: [
          { id: 'edge-tts-nanami', label: 'Nanami' },
          { id: 'google-tts', label: 'Google' },
          { id: 'edge-tts-keita', label: 'Keita' }
        ],

        init() {
          this.loadStateFromUrl();
          document.addEventListener('keydown', (e) => {
            if (this.layout !== 'single') return;
            if (e.key === 'ArrowLeft') this.prevCard();
            if (e.key === 'ArrowRight') this.nextCard();
            if (e.key === ' ') {
              e.preventDefault();
              document.activeElement.blur();
              if (!this.showText) this.playSoundFromCard(this.currentCard);
            }
          });
          window.addEventListener('popstate', () => this.loadStateFromUrl());
        },

        loadStateFromUrl() {
          const params = new URLSearchParams(window.location.search);
          const filtersParam = params.get('filters');
          if (filtersParam) {
            try {
              const parsed = JSON.parse(filtersParam);
              Object.keys(parsed).forEach(key => {
                if (this.filters.hasOwnProperty(key)) {
                  this.filters[key] = parsed[key];
                }
              });
            } catch (e) {}
          }
          const layoutParam = params.get('layout');
          if (layoutParam) {
            this.layout = layoutParam;
          }
          const showTextParam = params.get('showText');
          if (showTextParam) {
            this.showText = showTextParam === 'true';
          }
          const voiceParam = params.get('voice');
          if (voiceParam) {
            this.selectedVoice = voiceParam;
          }
          const cardIdParam = params.get('cardId');
          if (cardIdParam && this.cards.length > 0) {
            const idx = this.cards.findIndex(c => this.getCardId(c) === cardIdParam);
            if (idx !== -1) {
              this.currentIndex = idx;
            } else {
              this.currentIndex = 0;
            }
          } else {
            this.currentIndex = 0;
          }
        },

        getCardId(card) {
          return card.hiragana + '|' + card.romaji;
        },

        saveStateToUrl() {
          const params = new URLSearchParams();
          params.set('filters', JSON.stringify(this.filters));
          params.set('layout', this.layout);
          params.set('showText', this.showText);
          params.set('voice', this.selectedVoice);
          if (this.layout === 'single' && this.currentCard) {
            params.set('cardId', this.getCardId(this.currentCard));
          }
          const newUrl = window.location.pathname + '?' + params.toString();
          history.pushState({}, '', newUrl);
        },

        get cards() {
          return this.allCards.filter(card => this.filters[card.category]);
        },

        get currentCard() {
          return this.cards[this.currentIndex] || null;
        },

        get basicCount() { return this.allCards.filter(c => c.category === 'basic').length; },
        get dakuonCount() { return this.allCards.filter(c => c.category === 'dakuon').length; },
        get handakuonCount() { return this.allCards.filter(c => c.category === 'handakuon').length; },
        get youonCount() { return this.allCards.filter(c => c.category === 'youon').length; },
        
        get flippedCount() {
          return this.cards.filter(c => c.flipped).length;
        },
        
        get allFlipped() {
          return this.flippedCount === this.cards.length;
        },

        get voiceLabel() {
          const voice = this.voices.find(v => v.id === this.selectedVoice);
          return voice ? voice.label : 'Voice';
        },

        cycleVoice() {
          const currentIndex = this.voices.findIndex(v => v.id === this.selectedVoice);
          const nextIndex = (currentIndex + 1) % this.voices.length;
          this.selectedVoice = this.voices[nextIndex].id;
          this.saveStateToUrl();
        },

        toggleLayout() {
          this.layout = this.layout === 'grid' ? 'single' : 'grid';
          this.saveStateToUrl();
        },

        toggleFilter(filter) {
          const prevCard = this.currentCard;
          this.filters[filter] = !this.filters[filter];
          if (prevCard && !this.cards.includes(prevCard)) {
            this.currentIndex = 0;
          }
          this.saveStateToUrl();
        },

        flipCard(index) {
          const card = this.cards[index];
          card.flipped = !card.flipped;
        },

        toggleCurrentCard() {
          if (this.currentCard) {
            this.currentCard.flipped = !this.currentCard.flipped;
          }
        },

        nextCard() {
          if (this.currentIndex < this.cards.length - 1) {
            this.currentIndex++;
          } else {
            this.currentIndex = 0;
          }
          if (!this.showText) {
            this.playSoundFromCard(this.currentCard);
          }
          this.saveStateToUrl();
        },

        prevCard() {
          if (this.currentIndex > 0) {
            this.currentIndex--;
          } else {
            this.currentIndex = this.cards.length - 1;
          }
          if (!this.showText) {
            this.playSoundFromCard(this.currentCard);
          }
          this.saveStateToUrl();
        },
        
        shuffle() {
          const visibleCards = this.cards;
          for (let i = visibleCards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const cardI = visibleCards[i];
            const cardJ = visibleCards[j];
            const idxI = this.allCards.indexOf(cardI);
            const idxJ = this.allCards.indexOf(cardJ);
            [this.allCards[idxI], this.allCards[idxJ]] = [this.allCards[idxJ], this.allCards[idxI]];
          }
          this.currentIndex = 0;
          this.saveStateToUrl();
        },
        
        flipAll() {
          const shouldFlip = !this.allFlipped;
          this.cards.forEach(card => card.flipped = shouldFlip);
        },

        toggleSoundMode() {
          this.showText = !this.showText;
          if (!this.showText && this.layout === 'single') {
            this.playSoundFromCard(this.currentCard);
          }
          this.saveStateToUrl();
        },

        playSoundFromCard(card) {
          if (!card) return;
          const filename = card.hiragana + '.mp3';
          const audioUrl = `${this.selectedVoice}/hiragana/${filename}`;
          const audio = new Audio(audioUrl);
          audio.play().catch(err => console.log('Playback failed:', err));
        }
      };
    }
  </script>
</body>
</html>
