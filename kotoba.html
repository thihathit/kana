<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kotoba Flashcards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
  </style>
</head>
<body class="bg-gradient-to-br from-cyan-50 to-teal-100 min-h-screen grid grid-rows-[1fr_auto]" x-data="kotobaApp()" x-init="init()">
  <div class="container mx-auto px-2 py-6 sm:px-4 sm:py-8 w-full flex flex-col justify-center">
    <div x-show="!loaded" class="text-center py-20">
      <p class="text-gray-600 text-lg">Loading vocabulary...</p>
    </div>
    <div x-show="loaded" x-cloak>
    <div class="text-center mb-6 sm:mb-8">
      <h1 class="text-3xl sm:text-4xl font-bold text-gray-800 mb-2 flex items-center justify-center gap-2">
        Kotoba Flashcards
        <span class="text-xs px-2 py-1 bg-yellow-400 text-yellow-800 rounded-full font-bold">BETA</span>
      </h1>
      <p class="text-gray-600 text-sm sm:text-base">Click a card to flip • <span x-text="flippedCount"></span> / <span x-text="cards.length"></span> flipped</p>
    </div>

    <div class="flex flex-wrap justify-center gap-2 sm:gap-4 mb-6">
      <button @click="shuffle()" class="px-4 sm:px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        Shuffle
      </button>
      <button @click="flipAll()" class="px-4 sm:px-6 py-2 bg-cyan-600 hover:bg-cyan-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        <span x-show="!allFlipped">Flip All</span>
        <span x-show="allFlipped">Unflip All</span>
      </button>
      <button @click="layout = layout === 'grid' ? 'single' : 'grid'" class="px-4 sm:px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-sm sm:text-base">
        <span x-show="layout === 'grid'">Single View</span>
        <span x-show="layout === 'single'">Grid View</span>
      </button>
      <button @click="cycleVoice()" class="px-4 py-2 rounded-lg shadow bg-purple-600 hover:bg-purple-700 text-white text-sm">
        <span x-text="voiceLabel"></span> ↻
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-1 sm:gap-2 mb-6">
      <button @click="toggleFilter('n5')" 
              class="px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="filters.n5 ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        N5 <span x-text="n5Count"></span>
      </button>
      <button @click="toggleFilter('n4')" 
              class="px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="filters.n4 ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        N4 <span x-text="n4Count"></span>
      </button>
      <button @click="toggleFilter('n3')" 
              class="px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="filters.n3 ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        N3 <span x-text="n3Count"></span>
      </button>
      <button @click="toggleFilter('n2')" 
              class="px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="filters.n2 ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        N2 <span x-text="n2Count"></span>
      </button>
      <button @click="toggleFilter('n1')" 
              class="px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow transition-colors text-xs sm:text-sm"
              :class="filters.n1 ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'">
        N1 <span x-text="n1Count"></span>
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-3 sm:gap-4" x-show="layout === 'grid'">
      <template x-for="(card, index) in cards" :key="index">
        <div class="perspective-1000 w-36 h-44 sm:w-48 sm:h-56 cursor-pointer" @click="flipCard(index)">
          <div class="transform-style-3d w-full h-full relative transition-transform duration-300" 
               :class="card.flipped ? 'rotate-y-180' : ''">
            
            <div class="absolute w-full h-full backface-hidden bg-white rounded-xl shadow-lg flex flex-col items-center justify-center border-2 border-gray-300 p-2 sm:p-3">
              <span class="text-xl sm:text-2xl text-gray-800 text-center leading-tight" x-text="card.word"></span>
              <span class="text-xs text-gray-400 mt-2 uppercase" x-text="card.category"></span>
            </div>
            
            <div class="absolute w-full h-full backface-hidden rounded-xl shadow-lg flex flex-col items-center justify-center border-2 rotate-y-180 bg-cyan-600 border-cyan-400 p-2 sm:p-3">
              <span class="text-lg sm:text-xl text-white font-semibold text-center leading-tight" x-text="card.word"></span>
              <span class="text-sm sm:text-base mt-1 text-cyan-200 text-center" x-text="card.reading"></span>
              <span class="text-base sm:text-lg mt-2 text-cyan-100 text-center" x-text="card.meaning"></span>
              <button @click.stop="playSound(card)" class="mt-2 px-3 py-1 bg-white/20 hover:bg-white/30 text-white text-sm rounded-lg transition-colors">🔊 Listen</button>
            </div>
            
          </div>
        </div>
      </template>
    </div>

    <div x-show="layout === 'single'" x-cloak class="flex flex-col items-center">
      <div class="perspective-1000 w-full max-w-md cursor-pointer mb-6" @click="toggleCurrentCard()">
        <div class="transform-style-3d w-full h-48 sm:h-56 relative transition-transform duration-300" 
             :class="currentCard?.flipped ? 'rotate-y-180' : ''">
          
          <div class="absolute w-full h-full backface-hidden bg-white rounded-2xl shadow-2xl flex flex-col items-center justify-center border-4 border-gray-300 p-4 sm:p-6">
            <span class="text-4xl sm:text-5xl text-gray-800 text-center leading-tight" x-text="currentCard?.word"></span>
            <span class="text-sm text-gray-400 mt-4 uppercase" x-text="currentCard?.category"></span>
          </div>
          
          <div class="absolute w-full h-full backface-hidden rounded-2xl shadow-2xl flex flex-col items-center justify-center border-4 rotate-y-180 bg-cyan-600 border-cyan-400 p-4 sm:p-6">
            <span class="text-3xl sm:text-4xl text-white font-semibold text-center leading-tight" x-text="currentCard?.word"></span>
            <span class="text-xl sm:text-2xl mt-1 text-cyan-200 text-center" x-text="currentCard?.reading"></span>
            <span class="text-lg sm:text-xl text-center mt-3 text-cyan-100" x-text="currentCard?.meaning"></span>
          </div>
          
        </div>
      </div>
      
      <div class="flex flex-col items-center gap-2">
        <div class="flex items-center gap-4">
          <button @click="prevCard()" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-lg">
            ← Prev
          </button>
          <button @click="playSound(currentCard)" class="px-8 py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-lg shadow transition-colors text-lg">
            🔊 Listen
          </button>
          <button @click="nextCard()" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-lg shadow transition-colors text-lg">
            Next →
          </button>
        </div>
        <span class="text-gray-600 font-medium" x-text="(currentIndex + 1) + ' / ' + cards.length"></span>
      </div>
    </div>
    </div>
  </div>

  <script>
    function kotobaApp() {

      return {
        loaded: false,
        allCards: [],
        filters: { n5: true, n4: true, n3: false, n2: false, n1: false },
        layout: 'grid',

        init() {
          fetch('jlpt_kotoba_data.json')
            .then(res => res.json())
            .then(data => {
              this.allCards = data.map(item => ({
                word: item.word,
                reading: item.furigana || item.word,
                meaning: item.meaning,
                category: 'n' + item.level,
                flipped: false
              }));
              this.loaded = true;
            })
            .catch(e => console.error('Failed to load vocabulary:', e));
          document.addEventListener('keydown', (e) => {
            if (this.layout !== 'single') return;
            if (e.key === 'ArrowLeft') this.prevCard();
            if (e.key === 'ArrowRight') this.nextCard();
          });
        },

        currentIndex: 0,
        selectedVoice: 'edge-tts-nanami',
        voices: [
          { id: 'edge-tts-nanami', label: 'Nanami' },
          { id: 'google-tts', label: 'Google' },
          { id: 'edge-tts-keita', label: 'Keita' }
        ],

        get cards() {
          return this.allCards.filter(card => this.filters[card.category]);
        },

        get currentCard() {
          return this.cards[this.currentIndex] || null;
        },

        get n5Count() { return this.allCards.filter(c => c.category === 'n5').length; },
        get n4Count() { return this.allCards.filter(c => c.category === 'n4').length; },
        get n3Count() { return this.allCards.filter(c => c.category === 'n3').length; },
        get n2Count() { return this.allCards.filter(c => c.category === 'n2').length; },
        get n1Count() { return this.allCards.filter(c => c.category === 'n1').length; },
        
        get flippedCount() {
          return this.cards.filter(c => c.flipped).length;
        },
        
        get allFlipped() {
          return this.flippedCount === this.cards.length;
        },

        get voiceLabel() {
          const voice = this.voices.find(v => v.id === this.selectedVoice);
          return voice ? voice.label : 'Voice';
        },

        cycleVoice() {
          const currentIndex = this.voices.findIndex(v => v.id === this.selectedVoice);
          const nextIndex = (currentIndex + 1) % this.voices.length;
          this.selectedVoice = this.voices[nextIndex].id;
        },

        toggleFilter(filter) {
          this.filters[filter] = !this.filters[filter];
          this.currentIndex = 0;
        },

        flipCard(index) {
          const card = this.cards[index];
          card.flipped = !card.flipped;
        },

        toggleCurrentCard() {
          if (this.currentCard) {
            this.currentCard.flipped = !this.currentCard.flipped;
          }
        },

        nextCard() {
          if (this.currentIndex < this.cards.length - 1) {
            this.currentIndex++;
          } else {
            this.currentIndex = 0;
          }
        },

        prevCard() {
          if (this.currentIndex > 0) {
            this.currentIndex--;
          } else {
            this.currentIndex = this.cards.length - 1;
          }
        },
        
        shuffle() {
          const visibleCards = this.cards;
          for (let i = visibleCards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const cardI = visibleCards[i];
            const cardJ = visibleCards[j];
            const idxI = this.allCards.indexOf(cardI);
            const idxJ = this.allCards.indexOf(cardJ);
            [this.allCards[idxI], this.allCards[idxJ]] = [this.allCards[idxJ], this.allCards[idxI]];
          }
        },
        
        flipAll() {
          const shouldFlip = !this.allFlipped;
          this.cards.forEach(card => card.flipped = shouldFlip);
        },

        playSound(card) {
          if (!card) return;
          const filename = card.reading + '.mp3';
          const audioUrl = `${this.selectedVoice}/kotoba/${filename}`;
          const audio = new Audio(audioUrl);
          audio.play().catch(err => console.log('Playback failed:', err));
        }
      };
    }
  </script>
  <a href="/" class="sticky bottom-0 block py-4 text-center bg-white/50 backdrop-blur-sm text-gray-700 font-medium">
    ← Home
  </a>
</body>
</html>
