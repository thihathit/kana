<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katakana Flashcards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Instrument+Serif&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F6F3;
      --surface: #FFFFFF;
      --border: #EAEAEA;
      --text: #111111;
      --text-secondary: #787774;
    }
    body {
      background-color: var(--bg);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
    }
    .font-serif { font-family: 'Instrument Serif', Georgia, serif; }
    [x-cloak] { display: none !important; }
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
    .btn {
      background: var(--text);
      color: white;
      border-radius: 6px;
      transition: all 0.2s ease;
    }
    .btn:hover { background: #333333; }
    .btn:active { transform: scale(0.98); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      transition: all 0.2s ease;
    }
    .btn-outline:hover { background: var(--surface); border-color: #999; }
    .card-flash {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: box-shadow 0.2s ease;
    }
    .card-flash:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .card-back {
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .tag {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-radius: 9999px;
      padding: 3px 10px;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }
  </style>
</head>
<body class="min-h-screen grid grid-rows-[1fr_auto]" x-data="katakanaApp()">
  <div class="fixed inset-0 pointer-events-none" style="opacity: 0.02;">
    <div class="absolute top-1/4 -left-32 w-96 h-96 bg-emerald-400 rounded-full blur-3xl animate-pulse" style="animation-duration: 20s;"></div>
    <div class="absolute bottom-1/4 -right-32 w-96 h-96 bg-cyan-400 rounded-full blur-3xl animate-pulse" style="animation-duration: 25s;"></div>
  </div>

  <div class="container mx-auto px-3 py-6 sm:px-6 sm:py-10 w-full flex flex-col justify-center">
    <header class="text-center mb-8 sm:mb-12 animate-in">
      <h1 class="font-serif text-3xl sm:text-5xl text-[#111111] tracking-tight mb-2">Katakana</h1>
      <p class="text-[#787774] text-sm sm:text-base"><span x-text="flippedCount"></span> / <span x-text="cards.length"></span> revealed</p>
    </header>

    <div class="flex flex-wrap justify-center gap-2 sm:gap-3 mb-6 animate-in" style="animation-delay: 100ms;">
      <button @click="shuffle()" class="btn px-4 sm:px-6 py-2 text-sm font-medium">Shuffle</button>
      <button @click="flipAll()" class="btn px-4 sm:px-6 py-2 text-sm font-medium">
        <span x-show="!allFlipped">Reveal All</span>
        <span x-show="allFlipped">Hide All</span>
      </button>
      <button @click="layout = layout === 'grid' ? 'single' : 'grid'" class="btn px-4 sm:px-6 py-2 text-sm font-medium">
        <span x-show="layout === 'grid'">Single</span>
        <span x-show="layout === 'single'">Grid</span>
      </button>
      <button @click="toggleSoundMode()" class="btn px-4 sm:px-6 py-2 text-sm font-medium"
              :class="showText ? 'opacity-60' : ''">
        <span x-show="showText">Text</span>
        <span x-show="!showText">Sound</span>
      </button>
      <button x-show="!showText" @click="cycleVoice()" class="btn px-3 py-2 text-sm font-medium">
        <span x-text="voiceLabel"></span>
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-1.5 sm:gap-2 mb-8 animate-in" style="animation-delay: 150ms;">
      <button @click="toggleFilter('basic')" 
              class="tag transition-colors"
              :class="filters.basic ? 'bg-[#111111] text-white' : 'bg-[#EAEAEA] text-[#787774]'">
        Basic <span x-text="basicCount"></span>
      </button>
      <button @click="toggleFilter('dakuon')" 
              class="tag transition-colors"
              :class="filters.dakuon ? 'bg-[#111111] text-white' : 'bg-[#EAEAEA] text-[#787774]'">
        Dakuon <span x-text="dakuonCount"></span>
      </button>
      <button @click="toggleFilter('handakuon')" 
              class="tag transition-colors"
              :class="filters.handakuon ? 'bg-[#111111] text-white' : 'bg-[#EAEAEA] text-[#787774]'">
        Handakuon <span x-text="handakuonCount"></span>
      </button>
      <button @click="toggleFilter('youon')" 
              class="tag transition-colors"
              :class="filters.youon ? 'bg-[#111111] text-white' : 'bg-[#EAEAEA] text-[#787774]'">
        Youon <span x-text="youonCount"></span>
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-3 sm:gap-3" x-show="layout === 'grid'">
      <template x-for="(card, index) in cards" :key="index">
        <div class="perspective-1000 w-24 sm:w-28 sm:h-40 cursor-pointer" @click="flipCard(index)">
          <div class="transform-style-3d w-full h-full relative transition-transform duration-300" 
               :class="card.flipped ? 'rotate-y-180' : ''">
            
            <div class="absolute w-full h-full backface-hidden card-flash flex items-center justify-center p-2">
              <span class="text-4xl sm:text-5xl text-[#111111]" x-text="card.katakana"></span>
            </div>
            
            <div class="absolute w-full h-full backface-hidden card-back rounded-xl flex flex-col items-center justify-center p-2 rotate-y-180"
                 @click.stop="showText ? flipCard(index) : playSoundFromCard(card)">
              <span class="text-xl sm:text-2xl font-medium text-[#111111]" 
                    x-text="showText ? card.romaji : ''"></span>
              <svg x-show="!showText" @click.stop="flipCard(index)" class="w-5 h-5 mt-2 text-[#787774]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
              </svg>
            </div>
            
          </div>
        </div>
      </template>
    </div>

    <div x-show="layout === 'single'" x-cloak class="flex flex-col items-center">
      <div class="perspective-1000 w-56 h-72 sm:w-72 sm:h-96 cursor-pointer mb-8" @click="toggleCurrentCard()">
        <div class="transform-style-3d w-full h-full relative transition-transform duration-300" 
             :class="currentCard?.flipped ? 'rotate-y-180' : ''">
          
          <div class="absolute w-full h-full backface-hidden card-flash flex items-center justify-center p-6">
            <span class="text-7xl sm:text-8xl text-[#111111]" x-text="currentCard?.katakana"></span>
          </div>
          
          <div class="absolute w-full h-full backface-hidden card-back rounded-2xl flex flex-col items-center justify-center p-6 rotate-y-180"
               @click.stop="showText ? toggleCurrentCard() : playSoundFromCard(currentCard)">
            <span class="text-4xl sm:text-5xl font-medium text-[#111111]" 
                  x-text="showText ? currentCard?.romaji : ''"></span>
            <svg x-show="!showText" @click.stop="toggleCurrentCard()" class="w-6 h-6 mt-4 text-[#787774]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
            </svg>
          </div>
          
        </div>
      </div>
      
      <div class="flex flex-col items-center gap-4">
        <div class="flex items-center gap-3 sm:gap-4">
          <button @click="prevCard()" class="btn-outline px-5 py-2.5 text-sm font-medium">
            <svg class="w-4 h-4 inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            Prev
          </button>
          <button x-show="!showText" @click="playSoundFromCard(currentCard)" class="btn px-6 py-2.5 text-sm font-medium">
            <svg class="w-4 h-4 inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            Listen
          </button>
          <button @click="nextCard()" class="btn-outline px-5 py-2.5 text-sm font-medium">
            Next
            <svg class="w-4 h-4 inline ml-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
        <span class="text-xs text-[#787774] font-mono" x-text="(currentIndex + 1) + ' / ' + cards.length"></span>
      </div>
    </div>
  </div>

  <script>
    function katakanaApp() {
      const katakanaData = [
        { katakana: 'ア', romaji: 'a', category: 'basic' }, { katakana: 'イ', romaji: 'i', category: 'basic' }, { katakana: 'ウ', romaji: 'u', category: 'basic' },
        { katakana: 'エ', romaji: 'e', category: 'basic' }, { katakana: 'オ', romaji: 'o', category: 'basic' },
        { katakana: 'カ', romaji: 'ka', category: 'basic' }, { katakana: 'キ', romaji: 'ki', category: 'basic' }, { katakana: 'ク', romaji: 'ku', category: 'basic' },
        { katakana: 'ケ', romaji: 'ke', category: 'basic' }, { katakana: 'コ', romaji: 'ko', category: 'basic' },
        { katakana: 'サ', romaji: 'sa', category: 'basic' }, { katakana: 'シ', romaji: 'shi', category: 'basic' }, { katakana: 'ス', romaji: 'su', category: 'basic' },
        { katakana: 'セ', romaji: 'se', category: 'basic' }, { katakana: 'ソ', romaji: 'so', category: 'basic' },
        { katakana: 'タ', romaji: 'ta', category: 'basic' }, { katakana: 'チ', romaji: 'chi', category: 'basic' }, { katakana: 'ツ', romaji: 'tsu', category: 'basic' },
        { katakana: 'テ', romaji: 'te', category: 'basic' }, { katakana: 'ト', romaji: 'to', category: 'basic' },
        { katakana: 'ナ', romaji: 'na', category: 'basic' }, { katakana: 'ニ', romaji: 'ni', category: 'basic' }, { katakana: 'ヌ', romaji: 'nu', category: 'basic' },
        { katakana: 'ネ', romaji: 'ne', category: 'basic' }, { katakana: 'ノ', romaji: 'no', category: 'basic' },
        { katakana: 'ハ', romaji: 'ha', category: 'basic' }, { katakana: 'ヒ', romaji: 'hi', category: 'basic' }, { katakana: 'フ', romaji: 'fu', category: 'basic' },
        { katakana: 'ヘ', romaji: 'he', category: 'basic' }, { katakana: 'ホ', romaji: 'ho', category: 'basic' },
        { katakana: 'マ', romaji: 'ma', category: 'basic' }, { katakana: 'ミ', romaji: 'mi', category: 'basic' }, { katakana: 'ム', romaji: 'mu', category: 'basic' },
        { katakana: 'メ', romaji: 'me', category: 'basic' }, { katakana: 'モ', romaji: 'mo', category: 'basic' },
        { katakana: 'ヤ', romaji: 'ya', category: 'basic' }, { katakana: 'ユ', romaji: 'yu', category: 'basic' }, { katakana: 'ヨ', romaji: 'yo', category: 'basic' },
        { katakana: 'ラ', romaji: 'ra', category: 'basic' }, { katakana: 'リ', romaji: 'ri', category: 'basic' }, { katakana: 'ル', romaji: 'ru', category: 'basic' },
        { katakana: 'レ', romaji: 're', category: 'basic' }, { katakana: 'ロ', romaji: 'ro', category: 'basic' }, { katakana: 'ワ', romaji: 'wa', category: 'basic' }, { katakana: 'ヲ', romaji: 'wo', category: 'basic' },
        { katakana: 'ン', romaji: 'n', category: 'basic' },
        { katakana: 'ガ', romaji: 'ga', category: 'dakuon' }, { katakana: 'ギ', romaji: 'gi', category: 'dakuon' }, { katakana: 'グ', romaji: 'gu', category: 'dakuon' },
        { katakana: 'ゲ', romaji: 'ge', category: 'dakuon' }, { katakana: 'ゴ', romaji: 'go', category: 'dakuon' },
        { katakana: 'ザ', romaji: 'za', category: 'dakuon' }, { katakana: 'ジ', romaji: 'ji', category: 'dakuon' }, { katakana: 'ズ', romaji: 'zu', category: 'dakuon' },
        { katakana: 'ゼ', romaji: 'ze', category: 'dakuon' }, { katakana: 'ゾ', romaji: 'zo', category: 'dakuon' },
        { katakana: 'ダ', romaji: 'da', category: 'dakuon' }, { katakana: 'ヂ', romaji: 'ji', category: 'dakuon' }, { katakana: 'ヅ', romaji: 'zu', category: 'dakuon' },
        { katakana: 'デ', romaji: 'de', category: 'dakuon' }, { katakana: 'ド', romaji: 'do', category: 'dakuon' },
        { katakana: 'バ', romaji: 'ba', category: 'dakuon' }, { katakana: 'ビ', romaji: 'bi', category: 'dakuon' }, { katakana: 'ブ', romaji: 'bu', category: 'dakuon' },
        { katakana: 'ベ', romaji: 'be', category: 'dakuon' }, { katakana: 'ボ', romaji: 'bo', category: 'dakuon' },
        { katakana: 'パ', romaji: 'pa', category: 'handakuon' }, { katakana: 'ピ', romaji: 'pi', category: 'handakuon' }, { katakana: 'プ', romaji: 'pu', category: 'handakuon' },
        { katakana: 'ペ', romaji: 'pe', category: 'handakuon' }, { katakana: 'ポ', romaji: 'po', category: 'handakuon' },
        { katakana: 'キャ', romaji: 'kya', category: 'youon' }, { katakana: 'キュ', romaji: 'kyu', category: 'youon' }, { katakana: 'キョ', romaji: 'kyo', category: 'youon' },
        { katakana: 'シャ', romaji: 'sha', category: 'youon' }, { katakana: 'シュ', romaji: 'shu', category: 'youon' }, { katakana: 'ショ', romaji: 'sho', category: 'youon' },
        { katakana: 'チャ', romaji: 'cha', category: 'youon' }, { katakana: 'チュ', romaji: 'chu', category: 'youon' }, { katakana: 'チョ', romaji: 'cho', category: 'youon' },
        { katakana: 'ニャ', romaji: 'nya', category: 'youon' }, { katakana: 'ニュ', romaji: 'nyu', category: 'youon' }, { katakana: 'ニョ', romaji: 'nyo', category: 'youon' },
        { katakana: 'ヒャ', romaji: 'hya', category: 'youon' }, { katakana: 'ヒュ', romaji: 'hyu', category: 'youon' }, { katakana: 'ヒョ', romaji: 'hyo', category: 'youon' },
        { katakana: 'ミャ', romaji: 'mya', category: 'youon' }, { katakana: 'ミュ', romaji: 'myu', category: 'youon' }, { katakana: 'ミョ', romaji: 'myo', category: 'youon' },
        { katakana: 'リャ', romaji: 'rya', category: 'youon' }, { katakana: 'リュ', romaji: 'ryu', category: 'youon' }, { katakana: 'リョ', romaji: 'ryo', category: 'youon' },
        { katakana: 'ギャ', romaji: 'gya', category: 'youon' }, { katakana: 'ギュ', romaji: 'gyu', category: 'youon' }, { katakana: 'ギョ', romaji: 'gyo', category: 'youon' },
        { katakana: 'ジャ', romaji: 'ja', category: 'youon' }, { katakana: 'ジュ', romaji: 'ju', category: 'youon' }, { katakana: 'ジョ', romaji: 'jo', category: 'youon' },
        { katakana: 'ビャ', romaji: 'bya', category: 'youon' }, { katakana: 'ビュ', romaji: 'byu', category: 'youon' }, { katakana: 'ビョ', romaji: 'byo', category: 'youon' },
        { katakana: 'ピャ', romaji: 'pya', category: 'youon' }, { katakana: 'ピュ', romaji: 'pyu', category: 'youon' }, { katakana: 'ピョ', romaji: 'pyo', category: 'youon' }
      ];

      return {
        allCards: katakanaData.map(item => ({ ...item, flipped: false })),
        filters: { basic: true, dakuon: true, handakuon: true, youon: true },
        layout: 'grid',
        currentIndex: 0,
        showText: false,
        selectedVoice: 'edge-tts-nanami',
        voices: [
          { id: 'edge-tts-nanami', label: 'Nanami' },
          { id: 'google-tts', label: 'Google' },
          { id: 'edge-tts-keita', label: 'Keita' }
        ],

        init() {
          document.addEventListener('keydown', (e) => {
            if (this.layout !== 'single') return;
            if (e.key === 'ArrowLeft') this.prevCard();
            if (e.key === 'ArrowRight') this.nextCard();
            if (e.key === ' ') {
              e.preventDefault();
              document.activeElement.blur();
              if (!this.showText) this.playSoundFromCard(this.currentCard);
            }
          });
        },

        get cards() {
          return this.allCards.filter(card => this.filters[card.category]);
        },

        get currentCard() {
          return this.cards[this.currentIndex] || null;
        },

        get basicCount() { return this.allCards.filter(c => c.category === 'basic').length; },
        get dakuonCount() { return this.allCards.filter(c => c.category === 'dakuon').length; },
        get handakuonCount() { return this.allCards.filter(c => c.category === 'handakuon').length; },
        get youonCount() { return this.allCards.filter(c => c.category === 'youon').length; },
        
        get flippedCount() {
          return this.cards.filter(c => c.flipped).length;
        },
        
        get allFlipped() {
          return this.flippedCount === this.cards.length;
        },

        get voiceLabel() {
          const voice = this.voices.find(v => v.id === this.selectedVoice);
          return voice ? voice.label : 'Voice';
        },

        cycleVoice() {
          const currentIndex = this.voices.findIndex(v => v.id === this.selectedVoice);
          const nextIndex = (currentIndex + 1) % this.voices.length;
          this.selectedVoice = this.voices[nextIndex].id;
        },

        toggleFilter(filter) {
          this.filters[filter] = !this.filters[filter];
          this.currentIndex = 0;
        },

        flipCard(index) {
          const card = this.cards[index];
          card.flipped = !card.flipped;
        },

        toggleCurrentCard() {
          if (this.currentCard) {
            this.currentCard.flipped = !this.currentCard.flipped;
          }
        },

        nextCard() {
          if (this.currentIndex < this.cards.length - 1) {
            this.currentIndex++;
          } else {
            this.currentIndex = 0;
          }
          if (!this.showText) {
            this.playSoundFromCard(this.currentCard);
          }
        },

        prevCard() {
          if (this.currentIndex > 0) {
            this.currentIndex--;
          } else {
            this.currentIndex = this.cards.length - 1;
          }
          if (!this.showText) {
            this.playSoundFromCard(this.currentCard);
          }
        },
        
        shuffle() {
          const visibleCards = this.cards;
          for (let i = visibleCards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const cardI = visibleCards[i];
            const cardJ = visibleCards[j];
            const idxI = this.allCards.indexOf(cardI);
            const idxJ = this.allCards.indexOf(cardJ);
            [this.allCards[idxI], this.allCards[idxJ]] = [this.allCards[idxJ], this.allCards[idxI]];
          }
        },
        
        flipAll() {
          const shouldFlip = !this.allFlipped;
          this.cards.forEach(card => card.flipped = shouldFlip);
        },

        toggleSoundMode() {
          this.showText = !this.showText;
          if (!this.showText && this.layout === 'single') {
            this.playSoundFromCard(this.currentCard);
          }
        },

        playSoundFromCard(card) {
          if (!card) return;
          const filename = card.katakana + '.mp3';
          const audioUrl = `${this.selectedVoice}/katakana/${filename}`;
          const audio = new Audio(audioUrl);
          audio.play().catch(err => console.log('Playback failed:', err));
        }
      };
    }
  </script>
  <a href="index.html" class="sticky bottom-0 block py-4 text-center bg-[#F7F6F3]/80 backdrop-blur-sm text-[#787774] font-medium border-t border-[#EAEAEA]">
    <span class="inline-flex items-center gap-2">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Home
    </span>
  </a>
</body>
</html>
